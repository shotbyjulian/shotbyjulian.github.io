<!DOCTYPE html>
<html lang="sv" data-theme="dark" style="background-color: #0a0a0a;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>SHOT BY JULIAN — ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Archivo:wght@300;400;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4df; --text: #1a1a18; --text-muted: #878480;
    --line: rgba(0,0,0,0.08); --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  [data-theme="dark"] {
    --bg: #0a0a0a; --text: #e8e4df; --text-muted: #6b6965;
    --line: rgba(255,255,255,0.08);
  }

  html, body { background-color: var(--bg); color: var(--text); margin: 0; padding: 0; transition: background-color 0.8s var(--ease); scroll-behavior: smooth; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; }
  .serif { font-family: 'Fraunces', serif; }

  /* --- Header --- */
  header {
    position: fixed; top: 0; width: 100%; z-index: 2000;
    display: flex; justify-content: space-between; align-items: center;
    padding: 30px clamp(20px, 5vw, 60px); mix-blend-mode: difference; color: #fff;
  }
  .theme-btn { cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.1em; border: 1px solid rgba(255,255,255,0.3); padding: 6px 12px; }

  /* --- Hero: Full Screen Netflix Wall --- */
  .hero {
    height: 100vh; width: 100%; position: relative; overflow: hidden; background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  .wall-container {
    position: absolute; width: 180%; height: 180%;
    display: flex; flex-direction: column; gap: 25px;
    transform: rotate(-10deg) translateY(-5%);
  }
  .wall-row { display: flex; gap: 25px; width: 400%; animation: wallScroll 90s linear infinite; }
  .wall-row:nth-child(even) { animation-direction: reverse; }
  /* Större bilder i väggen */
  .wall-img { width: 35vw; aspect-ratio: 4/5; object-fit: cover; filter: brightness(0.6); flex-shrink: 0; }
  
  @keyframes wallScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .hero-title { position: relative; z-index: 10; font-family: 'Fraunces', serif; font-size: clamp(3.5rem, 15vw, 13rem); font-style: italic; color: #fff; text-align: center; line-height: 0.8; pointer-events: none; }

  /* --- Category Menu Section (Under Hero) --- */
  .category-section {
    padding: 120px clamp(20px, 10vw, 100px);
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
  }
  .menu-grid { display: flex; flex-direction: column; gap: 60px; max-width: 900px; width: 100%; }
  
  .menu-row { display: flex; align-items: center; gap: clamp(20px, 5vw, 50px); cursor: pointer; transition: 0.4s var(--ease); }
  .menu-row:hover { transform: translateX(20px); }

  /* Rutan som flashar automatiskt */
  .menu-box { 
    width: clamp(100px, 20vw, 220px); 
    aspect-ratio: 3/4; 
    background: var(--line); 
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .menu-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) contrast(1.1); position: absolute; opacity: 0; transition: opacity 0.15s; }
  .menu-box img.active { opacity: 1; }

  .menu-info { display: flex; flex-direction: column; gap: 6px; }
  .menu-cat { font-family: 'Fraunces', serif; font-size: clamp(2rem, 5vw, 4.5rem); font-style: italic; text-transform: capitalize; line-height: 1; }
  .menu-count { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: var(--text-muted); }

  /* --- Gallery Grid --- */
  .gallery-container { display: none; padding: 100px clamp(20px, 5vw, 60px); background: var(--bg); min-height: 100vh; }
  .gallery-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 40px; }
  .item { grid-column: span 12; cursor: pointer; }
  @media (min-width: 768px) { .item { grid-column: span 4; } .item.large { grid-column: span 8; } }
  .item img { width: 100%; height: auto; display: block; filter: brightness(0.95); }
  .item-meta { margin-top: 15px; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }

  /* --- Fullscreen Focus --- */
  .focus-overlay {
    position: fixed; inset: 0; z-index: 4000; background: var(--bg);
    display: none; align-items: center; justify-content: center; padding: 40px;
  }
  .focus-overlay.active { display: flex; }
  .focus-overlay img { max-height: 90vh; max-width: 95vw; object-fit: contain; }

</style>
</head>
<body data-theme="dark">

<header>
  <div class="serif" style="font-size: 1.2rem; font-style: italic;">SBJ</div>
  <div class="mono theme-btn" id="themeBtn">Mode</div>
</header>

<section class="hero" id="hero">
  <div class="wall-container" id="wall"></div>
  <h1 class="hero-title">Shot by Julian</h1>
</section>

<section class="category-section" id="menuSection">
  <div class="menu-grid" id="menuGrid"></div>
</section>

<section class="gallery-container" id="galleryContainer">
  <div class="mono" style="margin-bottom: 40px; cursor: pointer;" id="backToMenu">← Tillbaka</div>
  <div class="gallery-grid" id="grid"></div>
</section>

<div class="focus-overlay" id="focusOverlay">
  <img id="focusImg" src="" alt="">
</div>

<script>
  const DATA = Array.from({length: 43}, (_, i) => {
    const n = i + 1;
    let a = "VROOM";
    if ([23,24,25,26,36].includes(n)) a = "NATURE";
    if ([32,33,34,35].includes(n)) a = "NOIR";
    if ([1,37].includes(n)) a = "MISC";
    if (n >= 38) a = "BERLIN";
    const img = { n: String(n), a: a };
    if (n === 38) img.f = "IMG_9234.jpeg";
    if (n === 39) img.f = "IMG_9235.jpeg";
    if (n === 40) img.f = "IMG_9236.jpeg";
    if (n === 41) img.f = "IMG_9237.jpeg";
    if (n === 42) img.f = "IMG_9238.jpeg";
    if (n === 43) img.f = "IMG_9239.jpeg";
    return img;
  });

  function getSrc(img) { return img.f ? `images/${img.f}` : `images/bild (${img.n}).jpg`; }

  // --- Theme ---
  const savedTheme = localStorage.getItem('sbj_theme') || 'dark';
  document.body.setAttribute('data-theme', savedTheme);
  document.getElementById('themeBtn').onclick = () => {
    const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('sbj_theme', next);
  };

  // --- Netflix Wall Build ---
  const wall = document.getElementById('wall');
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'wall-row';
    const rowImgs = [...DATA].sort(() => Math.random() - 0.5);
    rowImgs.concat(rowImgs).forEach(img => {
      const i = document.createElement('img');
      i.className = 'wall-img';
      i.src = getSrc(img);
      i.loading = "eager"; // Ladda hero-bilder direkt
      row.appendChild(i);
    });
    wall.appendChild(row);
  }

  // --- Menu Build & Auto-Flash ---
  const menuGrid = document.getElementById('menuGrid');
  const rawCats = ["BERLIN", "VROOM", "NATURE", "NOIR", "MISC"];
  const sortedCats = rawCats.sort(() => Math.random() - 0.5);
  sortedCats.push("ALL");

  sortedCats.forEach(cat => {
    const filtered = cat === "ALL" ? DATA : DATA.filter(i => i.a === cat);
    const row = document.createElement('div');
    row.className = 'menu-row';
    
    const box = document.createElement('div');
    box.className = 'menu-box';
    
    const flashImgs = [];
    filtered.slice(0, 10).forEach((img, idx) => {
      const i = document.createElement('img');
      i.src = getSrc(img);
      if(idx === 0) i.className = 'active';
      box.appendChild(i);
      flashImgs.push(i);
    });

    // Automatiskt Flashing
    let flashIdx = 0;
    setInterval(() => {
      flashImgs.forEach(img => img.classList.remove('active'));
      flashIdx = (flashIdx + 1) % flashImgs.length;
      flashImgs[flashIdx].classList.add('active');
    }, 250);

    const info = document.createElement('div');
    info.className = 'menu-info';
    info.innerHTML = `
      <div class="menu-cat">${cat.toLowerCase()}</div>
      <div class="mono menu-count">${filtered.length} Plates</div>
    `;

    row.onclick = () => {
      renderGallery(cat);
      document.getElementById('hero').style.display = 'none';
      document.getElementById('menuSection').style.display = 'none';
      document.getElementById('galleryContainer').style.display = 'block';
      window.scrollTo(0,0);
    };

    row.appendChild(box);
    row.appendChild(info);
    menuGrid.appendChild(row);
  });

  // --- Gallery Logic ---
  function renderGallery(cat) {
    const grid = document.getElementById('grid');
    const filtered = cat === "ALL" ? DATA : DATA.filter(i => i.a === cat);
    grid.innerHTML = '';
    filtered.forEach((img, idx) => {
      const el = document.createElement('div');
      el.className = `item ${idx % 7 === 0 ? 'large' : ''}`;
      el.innerHTML = `
        <img src="${getSrc(img)}" loading="lazy">
        <div class="item-meta mono">— PL ${img.n.padStart(2, '0')}</div>
      `;
      el.onclick = () => {
        document.getElementById('focusImg').src = getSrc(img);
        document.getElementById('focusOverlay').classList.add('active');
      };
      grid.appendChild(el);
    });
  }

  document.getElementById('backToMenu').onclick = () => {
    document.getElementById('hero').style.display = 'flex';
    document.getElementById('menuSection').style.display = 'flex';
    document.getElementById('galleryContainer').style.display = 'none';
    window.scrollTo(0,0);
  };

  document.getElementById('focusOverlay').onclick = function() { this.classList.remove('active'); };
</script>
</body>
</html>
