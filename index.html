<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SHOT BY JULIAN — ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Archivo:wght@300;400;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4df; --text: #1a1a18; --text-muted: #878480;
    --line: rgba(0,0,0,0.08); --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  [data-theme="dark"] {
    --bg: #0a0a0a; --text: #e8e4df; --text-muted: #6b6965;
    --line: rgba(255,255,255,0.08);
  }

  html, body { background-color: var(--bg); color: var(--text); margin: 0; padding: 0; transition: background-color 0.8s var(--ease); overflow-x: hidden; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; }
  .serif { font-family: 'Fraunces', serif; }

  /* --- Header --- */
  header {
    position: fixed; top: 0; width: 100%; z-index: 2000;
    display: flex; justify-content: space-between; align-items: center;
    padding: 30px clamp(20px, 5vw, 60px); mix-blend-mode: difference; color: #fff;
  }
  .header-btn { cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.1em; border: 1px solid rgba(255,255,255,0.3); padding: 6px 12px; }

  /* --- Hero: Diagonal Netflix Wall --- */
  .hero {
    height: 100svh; width: 100%; position: relative; overflow: hidden; background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  .wall-container {
    position: absolute; width: 160%; height: 160%;
    display: flex; flex-direction: column; gap: 15px;
    transform: rotate(-12deg) translateY(-10%);
  }
  .wall-row { display: flex; gap: 15px; width: 300%; animation: wallScroll 80s linear infinite; }
  .wall-row:nth-child(even) { animation-direction: reverse; }
  .wall-img { width: 22vw; aspect-ratio: 4/5; object-fit: cover; filter: brightness(0.5); flex-shrink: 0; }
  
  @keyframes wallScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .hero-title { position: relative; z-index: 10; font-family: 'Fraunces', serif; font-size: clamp(3.5rem, 12vw, 11rem); font-style: italic; color: #fff; text-align: center; line-height: 0.8; pointer-events: none; }

  /* --- Skiss-inspirerad Meny Overlay --- */
  .menu-overlay {
    position: fixed; inset: 0; z-index: 3000; background: var(--bg);
    display: none; flex-direction: column; padding: 100px clamp(20px, 10vw, 100px) 60px;
    overflow-y: auto;
  }
  .menu-overlay.active { display: flex; }
  
  .menu-grid { display: flex; flex-direction: column; gap: 40px; max-width: 800px; margin: 0 auto; width: 100%; }
  
  /* Raden från din skiss */
  .menu-row { display: flex; align-items: center; gap: 30px; cursor: pointer; transition: 0.3s var(--ease); }
  .menu-row:hover { transform: translateX(15px); }

  /* Rutan som flashar */
  .menu-box { 
    width: clamp(80px, 15vw, 160px); 
    aspect-ratio: 3/4; 
    background: var(--line); 
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .menu-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); position: absolute; opacity: 0; transition: opacity 0.1s; }
  .menu-box img.active { opacity: 1; }

  .menu-info { display: flex; flex-direction: column; gap: 4px; }
  .menu-cat { font-family: 'Fraunces', serif; font-size: clamp(1.8rem, 4vw, 3.5rem); font-style: italic; text-transform: capitalize; }
  .menu-count { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--text-muted); }

  .close-menu { position: absolute; top: 40px; right: 40px; cursor: pointer; font-size: 0.8rem; }

  /* --- Gallery Grid --- */
  .gallery-grid { padding: 80px clamp(20px, 5vw, 60px); display: grid; grid-template-columns: repeat(12, 1fr); gap: 40px; }
  .item { grid-column: span 12; }
  @media (min-width: 768px) { .item { grid-column: span 4; } .item.large { grid-column: span 8; } }
  .item img { width: 100%; height: auto; display: block; }
  .item-meta { margin-top: 12px; font-size: 0.65rem; color: var(--text-muted); }

  /* --- Fullscreen View --- */
  .focus-overlay {
    position: fixed; inset: 0; z-index: 4000; background: var(--bg);
    display: none; align-items: center; justify-content: center; padding: 40px;
  }
  .focus-overlay.active { display: flex; }
  .focus-overlay img { max-height: 90vh; max-width: 95vw; object-fit: contain; }

</style>
</head>
<body data-theme="dark">

<header>
  <div class="serif" style="font-size: 1.2rem; font-style: italic;">SBJ</div>
  <div style="display:flex; gap:20px;">
    <div class="mono header-btn" id="themeBtn">Mode</div>
    <div class="mono header-btn" id="openMenu">Menu</div>
  </div>
</header>

<section class="hero" id="hero">
  <div class="wall-container" id="wall"></div>
  <h1 class="hero-title">Shot by Julian</h1>
</section>

<div class="menu-overlay" id="menuOverlay">
  <div class="mono close-menu" id="closeMenu">Stäng ✕</div>
  <div class="menu-grid" id="menuGrid"></div>
</div>

<main class="gallery-grid" id="grid"></main>

<div class="focus-overlay" id="focusOverlay">
  <img id="focusImg" src="" alt="">
</div>

<script>
  // --- Databas ---
  const DATA = Array.from({length: 43}, (_, i) => {
    const n = i + 1;
    let a = "VROOM";
    if ([23,24,25,26,36].includes(n)) a = "NATURE";
    if ([32,33,34,35].includes(n)) a = "NOIR";
    if ([1,37].includes(n)) a = "MISC";
    if (n >= 38) a = "BERLIN";
    const img = { n: String(n), a: a };
    if (n === 38) img.f = "IMG_9234.jpeg";
    if (n === 39) img.f = "IMG_9235.jpeg";
    if (n === 40) img.f = "IMG_9236.jpeg";
    if (n === 41) img.f = "IMG_9237.jpeg";
    if (n === 42) img.f = "IMG_9238.jpeg";
    if (n === 43) img.f = "IMG_9239.jpeg";
    return img;
  });

  function getSrc(img) { return img.f ? `images/${img.f}` : `images/bild (${img.n}).jpg`; }

  // --- Theme Memory ---
  const savedTheme = localStorage.getItem('sbj_theme') || 'dark';
  document.body.setAttribute('data-theme', savedTheme);

  document.getElementById('themeBtn').onclick = () => {
    const current = document.body.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('sbj_theme', next);
  };

  // --- Netflix Wall ---
  const wall = document.getElementById('wall');
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'wall-row';
    const rowImgs = [...DATA].sort(() => Math.random() - 0.5);
    rowImgs.concat(rowImgs).forEach(img => {
      const i = document.createElement('img');
      i.className = 'wall-img';
      i.src = getSrc(img);
      row.appendChild(i);
    });
    wall.appendChild(row);
  }

  // --- Meny Logic ---
  const menuOverlay = document.getElementById('menuOverlay');
  const menuGrid = document.getElementById('menuGrid');
  
  // Kategorier: Slumpa alla utom ALL, lägg ALL sist
  const rawCats = ["BERLIN", "VROOM", "NATURE", "NOIR", "MISC"];
  const sortedCats = rawCats.sort(() => Math.random() - 0.5);
  sortedCats.push("ALL");

  sortedCats.forEach(cat => {
    const filtered = cat === "ALL" ? DATA : DATA.filter(i => i.a === cat);
    
    const row = document.createElement('div');
    row.className = 'menu-row';
    
    // Skapa rutan (boxen)
    const box = document.createElement('div');
    box.className = 'menu-box';
    
    // Förbered bilder för flash
    const flashImgs = [];
    filtered.slice(0, 8).forEach((img, idx) => {
      const i = document.createElement('img');
      i.src = getSrc(img);
      if(idx === 0) i.className = 'active';
      box.appendChild(i);
      flashImgs.push(i);
    });

    // Flash-effekt vid hover
    let flashTimer;
    row.onmouseenter = () => {
      let currentIdx = 0;
      flashTimer = setInterval(() => {
        flashImgs.forEach(img => img.classList.remove('active'));
        currentIdx = (currentIdx + 1) % flashImgs.length;
        flashImgs[currentIdx].classList.add('active');
      }, 180);
    };
    row.onmouseleave = () => clearInterval(flashTimer);

    // Info till höger
    const info = document.createElement('div');
    info.className = 'menu-info';
    info.innerHTML = `
      <div class="menu-cat">${cat.toLowerCase()}</div>
      <div class="mono menu-count">${filtered.length} Plates</div>
    `;

    row.onclick = () => {
      renderGallery(cat);
      menuOverlay.classList.remove('active');
      document.getElementById('hero').style.display = 'none';
      window.scrollTo(0,0);
    };

    row.appendChild(box);
    row.appendChild(info);
    menuGrid.appendChild(row);
  });

  document.getElementById('openMenu').onclick = () => menuOverlay.classList.add('active');
  document.getElementById('closeMenu').onclick = () => menuOverlay.classList.remove('active');

  // --- Gallery Grid Render ---
  function renderGallery(cat) {
    const grid = document.getElementById('grid');
    const filtered = cat === "ALL" ? DATA : DATA.filter(i => i.a === cat);
    grid.innerHTML = '';
    
    filtered.forEach((img, idx) => {
      const el = document.createElement('div');
      el.className = `item ${idx % 7 === 0 ? 'large' : ''}`;
      el.innerHTML = `
        <img src="${getSrc(img)}" loading="lazy">
        <div class="item-meta mono">— Index ${img.n}</div>
      `;
      el.onclick = () => {
        document.getElementById('focusImg').src = getSrc(img);
        document.getElementById('focusOverlay').classList.add('active');
      };
      grid.appendChild(el);
    });
  }

  document.getElementById('focusOverlay').onclick = function() { this.classList.remove('active'); };
</script>
</body>
</html>
