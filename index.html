<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBJ // ARCHIVE</title>
<style>
  :root {
    --bg: #0a0a0a;
    --text: #ffffff;
    --line: #ffffff;
    --accent: #222;
    --ye-ease: cubic-bezier(0.9, 0, 0.1, 1);
  }

  [data-theme="light"] {
    --bg: #f0f0f0;
    --text: #000000;
    --line: #000000;
    --accent: #ddd;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: crosshair; }
  
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    text-transform: uppercase; letter-spacing: -0.05em;
    overflow-x: hidden; -webkit-font-smoothing: antialiased;
    transition: background 0.5s var(--ye-ease);
  }

  /* --- TRANSITION SHUTTER --- */
  #shutter {
    position: fixed; inset: 0; background: var(--text);
    z-index: 10000; transform: translateY(100%); pointer-events: none;
  }

  /* --- INDUSTRIAL LABELS --- */
  .label {
    display: inline-block; border: 1px solid var(--text);
    padding: 2px 6px; font-size: 0.6rem; font-weight: 900;
    margin-bottom: 10px; line-height: 1;
  }

  header { 
    padding: 80px 20px 40px; 
    border-bottom: 4px solid var(--line);
  }
  .wordmark {
    font-size: 25vw; font-weight: 900; line-height: 0.7; 
    letter-spacing: -0.12em; transition: transform 0.8s var(--ye-ease);
  }

  /* --- NAV --- */
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0; position: sticky; top: 0; 
    background: var(--bg); z-index: 100; border-bottom: 4px solid var(--line);
  }
  .nav-group { display: flex; height: 60px; }
  
  nav button, #alltBtn {
    background: none; border-right: 4px solid var(--line); color: var(--text); 
    font-weight: 900; font-size: 0.8rem; cursor: pointer; padding: 0 25px;
    transition: background 0.3s; height: 100%;
  }
  nav button:hover, nav button[aria-current="true"] { background: var(--text); color: var(--bg); }
  #alltBtn { border-right: none; border-left: 4px solid var(--line); }

  /* --- GRID --- */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; background: var(--line); border-bottom: 4px solid var(--line); }
  @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }

  .plate { 
    position: relative; background: var(--bg); aspect-ratio: 1/1; 
    overflow: hidden; clip-path: inset(100% 0 0 0);
    transition: clip-path 1s var(--ye-ease);
  }
  .plate.revealed { clip-path: inset(0 0 0 0); }

  .frame { width: 100%; height: 100%; position: relative; overflow: hidden; }
  .frame img { 
    width: 100%; height: 100%; object-fit: cover; 
    filter: grayscale(1) brightness(0.8); transition: all 1s var(--ye-ease);
  }
  .plate:hover img { transform: scale(1.1); filter: grayscale(0) brightness(1.1); }

  /* Technical Sticker on Image */
  .hud {
    position: absolute; top: 15px; left: 15px; background: var(--text); color: var(--bg);
    padding: 4px 8px; font-family: monospace; font-size: 0.55rem; font-weight: 900;
    opacity: 0; transform: translateY(-10px); transition: all 0.4s var(--ye-ease);
  }
  .plate:hover .hud { opacity: 1; transform: translateY(0); }

  .grain {
    position: absolute; inset: 0; pointer-events: none; mix-blend-mode: overlay; opacity: 0.15;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* --- FOOTER --- */
  footer { 
    padding: 100px 20px; background: var(--bg);
    display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
  }
  .footer-box { border-top: 1px solid var(--line); padding-top: 20px; }
  .f-label { font-size: 0.6rem; opacity: 0.5; margin-bottom: 10px; }
  .f-link { display: block; font-size: 1.2rem; font-weight: 900; text-decoration: none; color: var(--text); margin-bottom: 5px; }
  .f-link:hover { text-decoration: underline; }

  /* --- UI CONTROLS --- */
  .controls { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 4px; z-index: 1000; }
  .ctrl-btn { 
    background: var(--text); color: var(--bg); border: none; font-weight: 900; 
    padding: 10px 15px; font-size: 0.6rem; width: 80px; text-align: center;
  }

  /* --- LIGHTBOX --- */
  .lightbox { 
    position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
    display: none; align-items: center; justify-content: center; 
  }
  .lightbox.active { display: flex; animation: flash 0.4s var(--ye-ease); }
  @keyframes flash { 0% { background: var(--text); } 100% { background: var(--bg); } }
  .lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; border: 10px solid var(--line); }

</style>
</head>
<body>

<div id="shutter"></div>

<header>
  <div class="label">STATUS: OPERATIONAL // V.5.0</div><br>
  <div class="wordmark" id="logo">SBJ</div>
</header>

<nav>
  <div class="nav-group" id="navLeft"></div>
  <button id="alltBtn">ALLT</button>
</nav>

<main>
  <div id="gallery" class="grid"></div>
</main>

<footer>
  <div class="footer-box">
    <div class="f-label">SOCIAL // CONNECT</div>
    <a href="https://instagram.com/shot_by_julian_" class="f-link" target="_blank">INSTAGRAM</a>
    <a href="mailto:hello@example.com" class="f-link">CONTACT ME</a>
  </div>
  <div class="footer-box">
    <div class="f-label">LEGAL // SYSTEM</div>
    <div style="font-weight: 900;">ALL RIGHTS RESERVED © <span id="year"></span></div>
    <div style="font-size: 0.6rem; margin-top: 10px; opacity: 0.5;">ARCHIVE CAPTURED BY JULIAN. UNAUTHORIZED USE IS PROHIBITED.</div>
  </div>
</footer>

<div class="controls">
  <button class="ctrl-btn" id="themeBtn">INVERT</button>
</div>

<div class="lightbox" id="lightbox">
  <img id="lbImg" src="">
</div>

<script>
  const IMAGES = [
    { n: "1", w: "AMICUS", a: "MISC", top: true }, { n: "2", w: "EQUUS", a: "VROOM" },
    { n: "3", w: "SPIRITUS", a: "VROOM" }, { n: "4", w: "AURUM", a: "VROOM" },
    { n: "5", w: "FERRUM", a: "VROOM", top: true }, { n: "6", w: "VELOX", a: "VROOM" },
    { n: "7", w: "対称", a: "VROOM" }, { n: "8", w: "閃光", a: "VROOM", top: true },
    { n: "9", w: "METALLUM", a: "VROOM" }, { n: "10", w: "FORMA", a: "VROOM", top: true },
    { n: "11", w: "LUMEN", a: "VROOM" }, { n: "12", w: "ROTA", a: "VROOM" },
    { n: "13", w: "技術", a: "VROOM", top: true }, { n: "14", w: "TAURO", a: "VROOM", top: true },
    { n: "15", w: "ALBUS", a: "VROOM" }, { n: "16", w: "MACHINA", a: "VROOM" },
    { n: "17", w: "ITER", a: "VROOM", top: true }, { n: "18", w: "NOCTIS", a: "VROOM" },
    { n: "19", w: "VIA", a: "VROOM" }, { n: "20", w: "VETUSTUS", a: "VROOM" },
    { n: "21", w: "CURVA", a: "VROOM" }, { n: "22", w: "IGNIS", a: "VROOM", top: true },
    { n: "23", w: "木漏れ日", a: "NATURE", top: true }, { n: "24", w: "SILVA", a: "NATURE", top: true },
    { n: "25", w: "FOLIUM", a: "NATURE" }, { n: "26", w: "VIRIDIS", a: "NATURE" },
    { n: "27", w: "VORS", a: "VROOM" }, { n: "28", w: "CANUS", a: "VROOM" },
    { n: "29", w: "URBS", a: "VROOM" }, { n: "30", w: "SILENT", a: "VROOM" },
    { n: "31", w: "VESPER", a: "VROOM" }, { n: "32", w: "暗闇", a: "NOIR", top: true },
    { n: "33", w: "UMBRA", a: "NOIR" }, { n: "34", w: "LUX", a: "NOIR" },
    { n: "35", w: "魂", a: "NOIR", top: true }, { n: "36", w: "ARBOR", a: "NATURE" },
    { n: "37", w: "AETHER", a: "MISC", top: true }
  ];

  const gallery = document.getElementById('gallery');
  const navLeft = document.getElementById('navLeft');
  const shutter = document.getElementById('shutter');
  const lb = document.getElementById('lightbox');

  function render(filter) {
    shutter.style.transform = 'translateY(100%)';
    shutter.animate([ { transform: 'translateY(100%)' }, { transform: 'translateY(0%)', offset: 0.5 }, { transform: 'translateY(-100%)' } ], { duration: 600, easing: 'cubic-bezier(0.9, 0, 0.1, 1)' });

    setTimeout(() => {
      gallery.innerHTML = '';
      let filtered = filter === 'TOP' ? IMAGES.filter(i => i.top) : (filter === 'ALLT' ? IMAGES : IMAGES.filter(i => i.a === filter));
      
      document.querySelectorAll('nav button, #alltBtn').forEach(btn => {
        btn.setAttribute('aria-current', btn.textContent === filter ? 'true' : 'false');
      });

      filtered.forEach((img, i) => {
        const plate = document.createElement('div');
        plate.className = 'plate';
        plate.innerHTML = `
          <div class="frame">
            <img src="images/bild (${img.n}).jpg" loading="lazy">
            <div class="grain"></div>
            <div class="hud">REF: ${img.n} // ${img.w}</div>
          </div>
        `;
        plate.onclick = () => {
          document.getElementById('lbImg').src = `images/bild (${img.n}).jpg`;
          lb.classList.add('active');
          document.body.style.overflow = 'hidden';
        };
        gallery.appendChild(plate);
        setTimeout(() => plate.classList.add('revealed'), i * 40);
      });
      window.scrollTo(0, 0);
    }, 300);
  }

  ['TOP', 'VROOM', 'NATURE', 'NOIR', 'MISC'].forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.onclick = () => render(cat);
    navLeft.appendChild(btn);
  });

  document.getElementById('alltBtn').onclick = () => render('ALLT');
  document.getElementById('logo').onclick = () => render('TOP');
  lb.onclick = () => { lb.classList.remove('active'); document.body.style.overflow = 'auto'; };
  
  document.getElementById('themeBtn').onclick = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  };

  document.getElementById('year').textContent = new Date().getFullYear();
  render('TOP');
</script>
</body>
</html>
