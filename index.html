<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBJ // ARCHIVE</title>
<style>
  :root {
    --bg: #000;
    --text: #fff;
    --line: #fff;
    --ye-ease: cubic-bezier(0.9, 0, 0.1, 1);
  }

  [data-theme="light"] {
    --bg: #fff;
    --text: #000;
    --line: #000;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    text-transform: uppercase; letter-spacing: -0.05em;
    overflow-x: hidden; -webkit-font-smoothing: antialiased;
    transition: background 0.4s var(--ye-ease);
  }

  /* --- SHUTTER TRANSITION --- */
  #shutter {
    position: fixed; inset: 0; background: var(--text);
    z-index: 10000; transform: translateY(100%); pointer-events: none;
  }

  /* --- HEADER --- */
  header { 
    padding: 40px 15px 20px; 
    border-bottom: 2px solid var(--line);
  }
  .wordmark {
    font-size: clamp(4rem, 20vw, 15rem); 
    font-weight: 900; line-height: 0.8; 
    letter-spacing: -0.1em;
  }
  .label-box {
    display: inline-block; border: 1px solid var(--text);
    padding: 2px 6px; font-size: 0.6rem; margin-bottom: 10px;
  }

  /* --- MOBILE OPTIMIZED NAV --- */
  nav {
    display: flex; position: sticky; top: 0; 
    background: var(--bg); z-index: 100; 
    border-bottom: 2px solid var(--line);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  nav::-webkit-scrollbar { display: none; }
  
  .nav-inner { display: flex; width: auto; }
  
  nav button, #alltBtn {
    background: none; border: none; border-right: 1px solid var(--line);
    color: var(--text); font-weight: 900; font-size: 0.75rem;
    padding: 18px 25px; cursor: pointer; white-space: nowrap;
    transition: background 0.2s;
  }
  nav button[aria-current="true"] { background: var(--text); color: var(--bg); }

  /* --- GRID --- */
  .grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); /* 2 kolumner på mobil för överblick */
    gap: 1px; 
    background: var(--line);
    border-bottom: 2px solid var(--line);
  }
  @media (min-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .plate { 
    position: relative; background: var(--bg); aspect-ratio: 1/1; 
    overflow: hidden; clip-path: inset(100% 0 0 0);
    transition: clip-path 0.8s var(--ye-ease);
  }
  .plate.revealed { clip-path: inset(0 0 0 0); }

  .frame { width: 100%; height: 100%; position: relative; }
  .frame img { 
    width: 100%; height: 100%; object-fit: cover; 
    filter: grayscale(1) brightness(0.8);
    transition: transform 1s var(--ye-ease), filter 0.5s;
  }
  
  /* På mobil kör vi en lättare hover-effekt eller ingen alls för att undvika "sticky hover" */
  @media (hover: hover) {
    .plate:hover img { transform: scale(1.05); filter: grayscale(0) brightness(1.1); }
  }

  .hud {
    position: absolute; bottom: 8px; left: 8px; 
    background: var(--text); color: var(--bg);
    padding: 2px 5px; font-family: monospace; font-size: 0.5rem;
    font-weight: 900; pointer-events: none;
    opacity: 0.8; /* Alltid lite synlig på mobil */
  }

  /* --- FOOTER (MOBILE STACKED) --- */
  footer { 
    padding: 60px 20px; display: flex; flex-direction: column; gap: 40px;
  }
  .footer-box { border-top: 1px solid var(--line); padding-top: 15px; }
  .f-label { font-size: 0.55rem; opacity: 0.5; margin-bottom: 8px; }
  .f-link { display: block; font-size: 1.1rem; font-weight: 900; text-decoration: none; color: var(--text); margin-bottom: 5px; }

  /* --- UI CONTROLS --- */
  .controls { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
  .ctrl-btn { 
    background: var(--text); color: var(--bg); border: none; font-weight: 900; 
    padding: 12px 20px; font-size: 0.65rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }

  /* --- LIGHTBOX --- */
  .lightbox { 
    position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
    display: none; align-items: center; justify-content: center; 
  }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 80vh; object-fit: contain; }

</style>
</head>
<body>

<div id="shutter"></div>

<header>
  <div class="label-box">SYSTEM: MOBILE_OPTIMIZED // SBJ_V5</div><br>
  <div class="wordmark" id="logo">SBJ</div>
</header>

<nav id="nav">
  <div class="nav-inner" id="navLeft"></div>
  <button id="alltBtn">ALLT</button>
</nav>

<main>
  <div id="gallery" class="grid"></div>
</main>

<footer>
  <div class="footer-box">
    <div class="f-label">SOCIAL // CONNECT</div>
    <a href="https://instagram.com/shot_by_julian_" class="f-link" target="_blank">INSTAGRAM</a>
    <a href="mailto:julian@example.com" class="f-link">CONTACT ME</a>
  </div>
  <div class="footer-box">
    <div class="f-label">LEGAL // RIGHTS</div>
    <div style="font-weight: 900; font-size: 0.9rem;">ALL RIGHTS RESERVED © <span id="year"></span></div>
    <div style="font-size: 0.55rem; margin-top: 5px; opacity: 0.4;">UNAUTHORIZED USE IS PROHIBITED.</div>
  </div>
</footer>

<div class="controls">
  <button class="ctrl-btn" id="themeBtn">INVERT</button>
</div>

<div class="lightbox" id="lightbox">
  <img id="lbImg" src="">
</div>

<script>
  const IMAGES = [
    { n: "1", w: "AMICUS", a: "MISC", top: true }, { n: "2", w: "EQUUS", a: "VROOM" },
    { n: "3", w: "SPIRITUS", a: "VROOM" }, { n: "4", w: "AURUM", a: "VROOM" },
    { n: "5", w: "FERRUM", a: "VROOM", top: true }, { n: "6", w: "VELOX", a: "VROOM" },
    { n: "7", w: "対称", a: "VROOM" }, { n: "8", w: "閃光", a: "VROOM", top: true },
    { n: "9", w: "METALLUM", a: "VROOM" }, { n: "10", w: "FORMA", a: "VROOM", top: true },
    { n: "11", w: "LUMEN", a: "VROOM" }, { n: "12", w: "ROTA", a: "VROOM" },
    { n: "13", w: "技術", a: "VROOM", top: true }, { n: "14", w: "TAURO", a: "VROOM", top: true },
    { n: "15", w: "ALBUS", a: "VROOM" }, { n: "16", w: "MACHINA", a: "VROOM" },
    { n: "17", w: "ITER", a: "VROOM", top: true }, { n: "18", w: "NOCTIS", a: "VROOM" },
    { n: "19", w: "VIA", a: "VROOM" }, { n: "20", w: "VETUSTUS", a: "VROOM" },
    { n: "21", w: "CURVA", a: "VROOM" }, { n: "22", w: "IGNIS", a: "VROOM", top: true },
    { n: "23", w: "木漏れ日", a: "NATURE", top: true }, { n: "24", w: "SILVA", a: "NATURE", top: true },
    { n: "25", w: "FOLIUM", a: "NATURE" }, { n: "26", w: "VIRIDIS", a: "NATURE" },
    { n: "27", w: "VORS", a: "VROOM" }, { n: "28", w: "CANUS", a: "VROOM" },
    { n: "29", w: "URBS", a: "VROOM" }, { n: "30", w: "SILENT", a: "VROOM" },
    { n: "31", w: "VESPER", a: "VROOM" }, { n: "32", w: "暗闇", a: "NOIR", top: true },
    { n: "33", w: "UMBRA", a: "NOIR" }, { n: "34", w: "LUX", a: "NOIR" },
    { n: "35", w: "魂", a: "NOIR", top: true }, { n: "36", w: "ARBOR", a: "NATURE" },
    { n: "37", w: "AETHER", a: "MISC", top: true }
  ];

  const gallery = document.getElementById('gallery');
  const navLeft = document.getElementById('navLeft');
  const shutter = document.getElementById('shutter');
  const lb = document.getElementById('lightbox');

  function render(filter) {
    // Snabba upp shutter för mobil responsivitet
    shutter.style.transform = 'translateY(100%)';
    shutter.animate([ { transform: 'translateY(100%)' }, { transform: 'translateY(0%)', offset: 0.5 }, { transform: 'translateY(-100%)' } ], { duration: 500, easing: 'cubic-bezier(0.9, 0, 0.1, 1)' });

    setTimeout(() => {
      gallery.innerHTML = '';
      let filtered = filter === 'TOP' ? IMAGES.filter(i => i.top) : (filter === 'ALLT' ? IMAGES : IMAGES.filter(i => i.a === filter));
      
      document.querySelectorAll('nav button, #alltBtn').forEach(btn => {
        btn.setAttribute('aria-current', btn.textContent === filter ? 'true' : 'false');
      });

      filtered.forEach((img, i) => {
        const plate = document.createElement('div');
        plate.className = 'plate';
        plate.innerHTML = `
          <div class="frame">
            <img src="images/bild (${img.n}).jpg" loading="lazy">
            <div class="hud">#${img.n}</div>
          </div>
        `;
        plate.onclick = () => {
          document.getElementById('lbImg').src = `images/bild (${img.n}).jpg`;
          lb.classList.add('active');
          document.body.style.overflow = 'hidden';
        };
        gallery.appendChild(plate);
        setTimeout(() => plate.classList.add('revealed'), i * 30);
      });
      window.scrollTo(0, 0);
    }, 250);
  }

  ['TOP', 'VROOM', 'NATURE', 'NOIR', 'MISC'].forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.onclick = () => render(cat);
    navLeft.appendChild(btn);
  });

  document.getElementById('alltBtn').onclick = () => render('ALLT');
  document.getElementById('logo').onclick = () => render('TOP');
  lb.onclick = () => { lb.classList.remove('active'); document.body.style.overflow = 'auto'; };
  
  document.getElementById('themeBtn').onclick = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  };

  document.getElementById('year').textContent = new Date().getFullYear();
  render('TOP');
</script>
</body>
</html>
