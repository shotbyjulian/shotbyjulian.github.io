<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBJ</title>
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --line: #1a1a1a;
    --ye-ease: cubic-bezier(0.9, 0, 0.1, 1);
    --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  [data-theme="light"] {
    --bg: #ffffff;
    --text: #000000;
    --line: #eeeeee;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    text-transform: uppercase; letter-spacing: -0.05em;
    overflow-x: hidden; -webkit-font-smoothing: antialiased;
    transition: background 0.8s var(--ye-ease);
  }

  /* --- SHUTTER WIPE (Album Transition) --- */
  #shutter {
    position: fixed; inset: 0; background: var(--text);
    z-index: 10000; pointer-events: none;
    transform: translateY(100%);
  }

  /* --- HEADER & KINETIC LOGO --- */
  header { 
    padding: 100px 15px 40px; 
    border-bottom: 1px solid var(--line);
    overflow: hidden;
  }
  .wordmark {
    font-size: 32vw; font-weight: 900; line-height: 0.7; 
    letter-spacing: -0.1em; cursor: pointer;
    transition: letter-spacing 0.8s var(--ye-ease), transform 0.8s var(--ye-ease);
    display: inline-block;
    will-change: letter-spacing, transform;
  }

  /* --- NAV --- */
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 15px; position: sticky; top: 0; 
    background: var(--bg); z-index: 100; border-bottom: 1px solid var(--line);
    transition: padding 0.4s var(--ye-ease);
  }
  .nav-group { display: flex; gap: 20px; }
  
  nav button {
    background: none; border: none; color: var(--text); opacity: 0.4;
    font-weight: 900; font-size: 0.7rem; cursor: pointer; padding: 5px 0;
    transition: all 0.3s var(--ye-ease); position: relative;
  }
  nav button::after {
    content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px;
    background: var(--text); transition: width 0.3s var(--ye-ease);
  }
  nav button:hover::after, nav button[aria-current="true"]::after { width: 100%; }
  nav button:hover, nav button[aria-current="true"] { opacity: 1; transform: translateY(-2px); }

  /* --- GRID --- */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); }
  @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }

  .plate { 
    position: relative; background: var(--bg); aspect-ratio: 1/1; 
    overflow: hidden; cursor: pointer;
    clip-path: inset(100% 0 0 0); /* Initial state för reveal */
    transition: clip-path 1.2s var(--ye-ease), transform 0.8s var(--ye-ease);
  }
  .plate.revealed { clip-path: inset(0 0 0 0); }
  .plate:hover { transform: scale(0.98); z-index: 10; }

  .plate img { 
    width: 100%; height: 100%; object-fit: cover; 
    filter: brightness(0.8) grayscale(0.2); 
    transition: transform 1.5s var(--ye-ease), filter 0.8s var(--ye-ease);
  }
  .plate:hover img { transform: scale(1.15); filter: brightness(1.1) grayscale(0); }

  /* Metadata HUD */
  .hud {
    position: absolute; bottom: 12px; left: 12px; font-family: monospace; font-size: 0.5rem;
    color: var(--text); opacity: 0; transform: translateX(-10px);
    transition: all 0.4s var(--ye-ease) 0.1s; pointer-events: none;
  }
  .plate:hover .hud { opacity: 0.8; transform: translateX(0); }

  .grain {
    position: absolute; inset: 0; pointer-events: none; mix-blend-mode: overlay; opacity: 0.15;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* --- UI CONTROLS --- */
  .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 1000; }
  .ctrl-btn { 
    background: var(--text); color: var(--bg); border: none; font-weight: 900; 
    padding: 15px 25px; font-size: 0.65rem; letter-spacing: 0.1em;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    transition: transform 0.3s var(--spring), filter 0.3s;
  }
  .ctrl-btn:hover { transform: translateY(-5px) scale(1.05); filter: invert(1); }
  .ctrl-btn:active { transform: scale(0.95); }

  /* --- LIGHTBOX --- */
  .lightbox { 
    position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
    display: none; align-items: center; justify-content: center; 
    opacity: 0; transition: opacity 0.5s var(--ye-ease);
  }
  .lightbox.active { display: flex; opacity: 1; }
  .lightbox img { 
    max-width: 90vw; max-height: 85vh; object-fit: contain; 
    transform: scale(0.8) translateY(50px);
    transition: transform 0.8s var(--spring);
  }
  .lightbox.active img { transform: scale(1) translateY(0); }

  footer { padding: 80px 15px; font-size: 0.6rem; opacity: 0.2; text-align: center; border-top: 1px solid var(--line); }

  /* Animation for Mono Mode */
  body.mono-active .plate img { filter: grayscale(1) contrast(1.1); }

</style>
</head>
<body>

<div id="shutter"></div>

<header>
  <div class="wordmark" id="logo">SBJ</div>
</header>

<nav id="navbar">
  <div class="nav-group" id="navLeft"></div>
  <button id="alltBtn">ALLT</button>
</nav>

<main>
  <div id="gallery" class="grid"></div>
</main>

<div class="controls">
  <button class="ctrl-btn" id="monoBtn">MONOCHROME</button>
  <button class="ctrl-btn" id="themeBtn">INVERT</button>
</div>

<div class="lightbox" id="lightbox">
  <img id="lbImg" src="">
  <div class="grain"></div>
</div>

<footer>
  ARCHIVE SYSTEM — SBJ V.4.0 — © <span id="year"></span>
</footer>

<script>
  const IMAGES = [
    { n: "1", w: "AMICUS", a: "MISC", top: true }, { n: "2", w: "EQUUS", a: "VROOM" },
    { n: "3", w: "SPIRITUS", a: "VROOM" }, { n: "4", w: "AURUM", a: "VROOM" },
    { n: "5", w: "FERRUM", a: "VROOM", top: true }, { n: "6", w: "VELOX", a: "VROOM" },
    { n: "7", w: "対称", a: "VROOM" }, { n: "8", w: "閃光", a: "VROOM", top: true },
    { n: "9", w: "METALLUM", a: "VROOM" }, { n: "10", w: "FORMA", a: "VROOM", top: true },
    { n: "11", w: "LUMEN", a: "VROOM" }, { n: "12", w: "ROTA", a: "VROOM" },
    { n: "13", w: "技術", a: "VROOM", top: true }, { n: "14", w: "TAURO", a: "VROOM", top: true },
    { n: "15", w: "ALBUS", a: "VROOM" }, { n: "16", w: "MACHINA", a: "VROOM" },
    { n: "17", w: "ITER", a: "VROOM", top: true }, { n: "18", w: "NOCTIS", a: "VROOM" },
    { n: "19", w: "VIA", a: "VROOM" }, { n: "20", w: "VETUSTUS", a: "VROOM" },
    { n: "21", w: "CURVA", a: "VROOM" }, { n: "22", w: "IGNIS", a: "VROOM", top: true },
    { n: "23", w: "木漏れ日", a: "NATURE", top: true }, { n: "24", w: "SILVA", a: "NATURE", top: true },
    { n: "25", w: "FOLIUM", a: "NATURE" }, { n: "26", w: "VIRIDIS", a: "NATURE" },
    { n: "27", w: "VORS", a: "VROOM" }, { n: "28", w: "CANUS", a: "VROOM" },
    { n: "29", w: "URBS", a: "VROOM" }, { n: "30", w: "SILENT", a: "VROOM" },
    { n: "31", w: "VESPER", a: "VROOM" }, { n: "32", w: "暗闇", a: "NOIR", top: true },
    { n: "33", w: "UMBRA", a: "NOIR" }, { n: "34", w: "LUX", a: "NOIR" },
    { n: "35", w: "魂", a: "NOIR", top: true }, { n: "36", w: "ARBOR", a: "NATURE" },
    { n: "37", w: "AETHER", a: "MISC", top: true }
  ];

  const gallery = document.getElementById('gallery');
  const navLeft = document.getElementById('navLeft');
  const logo = document.getElementById('logo');
  const shutter = document.getElementById('shutter');
  const lb = document.getElementById('lightbox');

  // --- KINETIC LOGO (Scroll React) ---
  window.addEventListener('scroll', () => {
    const scroll = window.scrollY;
    const tracking = Math.max(-0.15, -0.1 - (scroll / 2000));
    const scale = 1 - (scroll / 5000);
    logo.style.letterSpacing = `${tracking}em`;
    logo.style.transform = `scale(${scale})`;
    
    // Nav shrink
    const navbar = document.getElementById('navbar');
    navbar.style.padding = scroll > 100 ? '10px 15px' : '20px 15px';
  });

  // --- SHUTTER ANIMATION ---
  function triggerShutter(callback) {
    shutter.style.transform = 'translateY(100%)';
    const anim = shutter.animate([
      { transform: 'translateY(100%)' },
      { transform: 'translateY(0%)', offset: 0.5 },
      { transform: 'translateY(-100%)' }
    ], { duration: 800, easing: 'cubic-bezier(0.9, 0, 0.1, 1)' });

    setTimeout(callback, 400);
  }

  function render(filter) {
    triggerShutter(() => {
      gallery.innerHTML = '';
      let filtered = filter === 'TOP' ? IMAGES.filter(i => i.top) : (filter === 'ALLT' ? IMAGES : IMAGES.filter(i => i.a === filter));
      
      document.querySelectorAll('nav button').forEach(btn => {
        btn.setAttribute('aria-current', btn.textContent === filter ? 'true' : 'false');
      });

      filtered.forEach((img, i) => {
        const plate = document.createElement('div');
        plate.className = 'plate';
        plate.innerHTML = `
          <img src="images/bild (${img.n}).jpg" loading="lazy">
          <div class="grain"></div>
          <div class="hud">TYPE_${img.a} // ID_${img.n}</div>
        `;
        plate.onclick = () => {
          document.getElementById('lbImg').src = `images/bild (${img.n}).jpg`;
          lb.classList.add('active');
          document.body.style.overflow = 'hidden';
        };
        gallery.appendChild(plate);
        
        // Staggered slutter-reveal
        setTimeout(() => plate.classList.add('revealed'), i * 50);
      });
      window.scrollTo(0, 0);
    });
  }

  ['TOP', 'VROOM', 'NATURE', 'NOIR', 'MISC'].forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.onclick = () => render(cat);
    navLeft.appendChild(btn);
  });

  document.getElementById('alltBtn').onclick = () => render('ALLT');
  logo.onclick = () => render('TOP');
  lb.onclick = () => { lb.classList.remove('active'); document.body.style.overflow = 'auto'; };
  
  document.getElementById('monoBtn').onclick = () => document.body.classList.toggle('mono-active');
  document.getElementById('themeBtn').onclick = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  };

  document.getElementById('year').textContent = new Date().getFullYear();
  render('TOP');
</script>
</body>
</html>
