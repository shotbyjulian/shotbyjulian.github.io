<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SHOT BY JULIAN — ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Archivo:wght@300;400;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4df; --text: #1a1a18; --text-muted: #878480;
    --line: rgba(0,0,0,0.08); --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  [data-theme="dark"] {
    --bg: #0a0a0a; --text: #e8e4df; --text-muted: #6b6965;
    --line: rgba(255,255,255,0.08);
  }

  html, body { background-color: var(--bg); color: var(--text); margin: 0; padding: 0; transition: background-color 0.8s var(--ease); overflow-x: hidden; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; }
  .serif { font-family: 'Fraunces', serif; }

  /* --- Header --- */
  header {
    position: fixed; top: 0; width: 100%; z-index: 2000;
    display: flex; justify-content: space-between; align-items: center;
    padding: 30px clamp(20px, 5vw, 60px); mix-blend-mode: difference; color: #fff;
  }
  .menu-trigger { cursor: pointer; font-weight: 600; font-size: 0.8rem; }

  /* --- Hero: Diagonal Netflix Wall --- */
  .hero {
    height: 100svh; width: 100%; position: relative; overflow: hidden; background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  .wall-container {
    position: absolute; width: 150%; height: 150%;
    display: flex; flex-direction: column; gap: 20px;
    transform: rotate(-15deg) scale(1.2);
  }
  .wall-row { display: flex; gap: 20px; width: 200%; animation: wallScroll 60s linear infinite; }
  .wall-row:nth-child(even) { animation-direction: reverse; }
  .wall-img { width: 300px; height: 200px; object-fit: cover; filter: brightness(0.4); flex-shrink: 0; }
  
  @keyframes wallScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .hero-title { position: relative; z-index: 10; font-family: 'Fraunces', serif; font-size: clamp(3rem, 12vw, 10rem); font-style: italic; color: #fff; text-align: center; line-height: 0.8; pointer-events: none; }

  /* --- Fullscreen Menu --- */
  .menu-overlay {
    position: fixed; inset: 0; z-index: 3000; background: var(--bg);
    display: none; grid-template-columns: 1fr 1fr;
  }
  .menu-overlay.active { display: grid; }
  
  .menu-list { display: flex; flex-direction: column; justify-content: center; padding: 60px; gap: 30px; }
  .menu-item { font-family: 'Fraunces', serif; font-size: clamp(2rem, 5vw, 4rem); font-style: italic; cursor: pointer; opacity: 0.4; transition: 0.3s; }
  .menu-item:hover { opacity: 1; transform: translateX(20px); }
  .menu-item .count { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; vertical-align: middle; margin-left: 15px; font-style: normal; }

  .menu-preview { 
    position: relative; overflow: hidden; background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  #previewImg { width: 80%; height: 80%; object-fit: contain; filter: grayscale(1); transition: opacity 0.1s; }

  .close-menu { position: absolute; top: 30px; right: 60px; cursor: pointer; z-index: 3001; }

  /* --- Grid (Clean) --- */
  .gallery-grid { padding: 80px clamp(20px, 5vw, 60px); display: grid; grid-template-columns: repeat(12, 1fr); gap: 40px; }
  .item { grid-column: span 12; cursor: pointer; }
  @media (min-width: 768px) { .item { grid-column: span 4; } .item.large { grid-column: span 8; } }
  
  .item img { width: 100%; height: auto; display: block; transition: transform 0.8s var(--ease); }
  .item:hover img { transform: scale(1.02); }
  .item-meta { margin-top: 15px; opacity: 0.5; font-size: 0.7rem; }

  /* --- Focus Mode --- */
  .focus-overlay {
    position: fixed; inset: 0; z-index: 4000; background: var(--bg);
    display: none; align-items: center; justify-content: center; padding: 40px;
  }
  .focus-overlay.active { display: flex; }
  .focus-overlay img { max-height: 90vh; max-width: 90vw; object-fit: contain; }

</style>
</head>
<body data-theme="dark">

<header>
  <div class="serif" style="font-size: 1.2rem; font-style: italic;">SBJ</div>
  <div style="display:flex; gap:30px;">
    <div class="mono menu-trigger" id="themeBtn">Mode</div>
    <div class="mono menu-trigger" id="openMenu">Menu</div>
  </div>
</header>

<section class="hero">
  <div class="wall-container" id="wall"></div>
  <h1 class="hero-title">Shot by Julian</h1>
</section>

<div class="menu-overlay" id="menuOverlay">
  <div class="mono close-menu" id="closeMenu">Close ✕</div>
  <div class="menu-list" id="menuList"></div>
  <div class="menu-preview">
    <img id="previewImg" src="" alt="">
  </div>
</div>

<main class="gallery-grid" id="grid"></main>

<div class="focus-overlay" id="focusOverlay">
  <img id="focusImg" src="" alt="">
</div>

<script>
  // --- Data ---
  const DATA = Array.from({length: 43}, (_, i) => {
    const n = i + 1;
    let a = "VROOM";
    if ([23,24,25,26,36].includes(n)) a = "NATURE";
    if ([32,33,34,35].includes(n)) a = "NOIR";
    if ([1,37].includes(n)) a = "MISC";
    if (n >= 38) a = "BERLIN";
    const img = { n: String(n), a: a };
    if (n >= 38) img.f = `IMG_923${n-4}.jpeg`;
    if (n === 38) img.f = "IMG_9234.jpeg";
    if (n === 39) img.f = "IMG_9235.jpeg";
    if (n === 40) img.f = "IMG_9236.jpeg";
    if (n === 41) img.f = "IMG_9237.jpeg";
    if (n === 42) img.f = "IMG_9238.jpeg";
    if (n === 43) img.f = "IMG_9239.jpeg";
    return img;
  });

  const CATS = ["BERLIN", "VROOM", "NATURE", "NOIR", "MISC", "ALL"];
  let currentFilter = "ALL";

  function getSrc(img) { return img.f ? `images/${img.f}` : `images/bild (${img.n}).jpg`; }

  // --- Persistent Theme ---
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.body.setAttribute('data-theme', savedTheme);

  document.getElementById('themeBtn').onclick = () => {
    const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
  };

  // --- Diagonal Wall ---
  const wall = document.getElementById('wall');
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'wall-row';
    const rowImgs = [...DATA].sort(() => Math.random() - 0.5);
    rowImgs.concat(rowImgs).forEach(img => {
      const i = document.createElement('img');
      i.className = 'wall-img';
      i.src = getSrc(img);
      row.appendChild(i);
    });
    wall.appendChild(row);
  }

  // --- Menu Logic ---
  const menuOverlay = document.getElementById('menuOverlay');
  const previewImg = document.getElementById('previewImg');
  let flashInterval;

  document.getElementById('openMenu').onclick = () => menuOverlay.classList.add('active');
  document.getElementById('closeMenu').onclick = () => menuOverlay.classList.remove('active');

  const menuList = document.getElementById('menuList');
  CATS.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'menu-item';
    const count = cat === 'ALL' ? DATA.length : DATA.filter(i => i.a === cat).length;
    item.innerHTML = `${cat} <span class="count">${count}</span>`;
    
    item.onmouseenter = () => {
      const filtered = cat === 'ALL' ? DATA : DATA.filter(i => i.a === cat);
      let idx = 0;
      flashInterval = setInterval(() => {
        previewImg.src = getSrc(filtered[idx]);
        idx = (idx + 1) % filtered.length;
      }, 150);
    };
    
    item.onmouseleave = () => clearInterval(flashInterval);
    
    item.onclick = () => {
      currentFilter = cat;
      renderGrid();
      menuOverlay.classList.remove('active');
      window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
    };
    menuList.appendChild(item);
  });

  // --- Grid Render ---
  function renderGrid() {
    const grid = document.getElementById('grid');
    const filtered = currentFilter === 'ALL' ? DATA : DATA.filter(i => i.a === currentFilter);
    grid.innerHTML = '';
    filtered.forEach((img, idx) => {
      const el = document.createElement('div');
      el.className = `item ${idx % 7 === 0 ? 'large' : ''}`;
      el.innerHTML = `
        <img src="${getSrc(img)}" loading="lazy">
        <div class="item-meta mono">— PL ${img.n.padStart(2, '0')}</div>
      `;
      el.onclick = () => {
        document.getElementById('focusImg').src = getSrc(img);
        document.getElementById('focusOverlay').classList.add('active');
      };
      grid.appendChild(el);
    });
  }

  document.getElementById('focusOverlay').onclick = function() { this.classList.remove('active'); };

  renderGrid();
</script>
</body>
</html>
