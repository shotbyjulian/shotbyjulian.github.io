<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBJ // ARCHIVE V6</title>
<style>
  :root {
    --bg: #000;
    --text: #fff;
    --line: #fff;
    --ye-ease: cubic-bezier(0.9, 0, 0.1, 1);
  }

  [data-theme="light"] {
    --bg: #f2f2f2;
    --text: #000;
    --line: #000;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    text-transform: uppercase; letter-spacing: -0.05em;
    overflow-x: hidden; -webkit-font-smoothing: antialiased;
    transition: background 0.4s var(--ye-ease);
  }

  #shutter {
    position: fixed; inset: 0; background: var(--text);
    z-index: 10000; transform: translateY(100%); pointer-events: none;
  }

  /* --- FULL WIDTH V6 LABEL --- */
  .system-banner {
    width: 100%; border-bottom: 2px solid var(--line);
    padding: 10px 15px; font-size: 0.65rem; font-weight: 900;
    display: flex; justify-content: space-between;
    background: var(--bg);
  }
  .system-banner span:nth-child(2) { opacity: 0.5; }

  header { padding: 40px 15px 15px; border-bottom: 4px solid var(--line); }
  .wordmark {
    font-size: clamp(4.5rem, 26vw, 20rem); 
    font-weight: 900; line-height: 0.72; 
    letter-spacing: -0.13em;
  }

  /* --- HYBRID NAV --- */
  nav {
    display: flex; position: sticky; top: 0; 
    background: var(--bg); z-index: 100; 
    border-bottom: 4px solid var(--line);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-inner { display: flex; width: 100%; }
  
  nav button, #alltBtn {
    background: none; border: none; border-right: 4px solid var(--line);
    color: var(--text); font-weight: 900; 
    padding: 20px 25px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s; font-size: 0.8rem;
  }
  @media (max-width: 600px) {
    nav button, #alltBtn { padding: 16px 20px; font-size: 0.7rem; border-right-width: 2px; }
    nav { border-bottom-width: 2px; }
    header { border-bottom-width: 2px; }
  }

  nav button[aria-current="true"] { background: var(--text); color: var(--bg); }
  #alltBtn { border-left: 4px solid var(--line); border-right: none; margin-left: auto; }

  /* --- GRID & LIVE FOCUS --- */
  .grid { 
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 1px; background: var(--line); border-bottom: 4px solid var(--line);
  }
  @media (min-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .plate { 
    position: relative; background: var(--bg); aspect-ratio: 1/1; 
    overflow: hidden; clip-path: inset(100% 0 0 0);
    transition: clip-path 0.8s var(--ye-ease);
  }
  .plate.revealed { clip-path: inset(0 0 0 0); }

  .frame { width: 100%; height: 100%; position: relative; }
  .frame img { 
    width: 100%; height: 100%; object-fit: cover; 
    filter: grayscale(1) brightness(0.6);
    transition: filter 0.6s var(--ye-ease), transform 1s var(--ye-ease);
  }
  
  /* MOBILE LIVE SCROLL FOCUS (Triggered via JS) */
  .plate.in-focus img {
    filter: grayscale(0) brightness(1.1);
  }

  /* DESKTOP HOVER */
  @media (hover: hover) {
    .plate:hover img { transform: scale(1.05); filter: grayscale(0) brightness(1.1); }
  }

  .hud {
    position: absolute; bottom: 8px; left: 8px; 
    background: var(--text); color: var(--bg);
    padding: 2px 5px; font-family: monospace; font-size: 0.5rem;
    font-weight: 900; opacity: 0.7;
  }

  /* --- FOOTER (LARGE LEGAL) --- */
  footer { padding: 80px 20px; display: flex; flex-direction: column; gap: 50px; }
  .footer-box { border-top: 2px solid var(--line); padding-top: 20px; }
  .f-label { font-size: 0.6rem; opacity: 0.5; margin-bottom: 15px; }
  .f-link { display: block; font-size: 1.5rem; font-weight: 900; text-decoration: none; color: var(--text); margin-bottom: 10px; }
  
  .legal-massive {
    font-size: clamp(1.5rem, 8vw, 4rem);
    font-weight: 900; line-height: 0.9;
    letter-spacing: -0.05em;
  }

  .ui-controls { position: fixed; bottom: 25px; right: 25px; z-index: 1000; }
  .ctrl-btn { background: var(--text); color: var(--bg); border: none; font-weight: 900; padding: 12px 20px; font-size: 0.6rem; }

  .lightbox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; align-items: center; justify-content: center; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 85vh; object-fit: contain; }

</style>
</head>
<body>

<div id="shutter"></div>

<div class="system-banner">
  <span id="system-tag">SYSTEM: INITIALIZING...</span>
  <span>SBJ_ARCHIVE_V6 // © 2024</span>
</div>

<header>
  <div class="wordmark" id="logo">SBJ</div>
</header>

<nav>
  <div class="nav-inner" id="navLeft"></div>
  <button id="alltBtn">ALLT</button>
</nav>

<main>
  <div id="gallery" class="grid"></div>
</main>

<footer>
  <div class="footer-box">
    <div class="f-label">CHANNELS</div>
    <a href="https://instagram.com/shot_by_julian_" class="f-link" target="_blank">INSTAGRAM</a>
    <a href="https://ig.me/m/shot_by_julian_" class="f-link" target="_blank">CONTACT ME (DM)</a>
  </div>
  <div class="footer-box">
    <div class="f-label">LEGAL_DOCUMENTATION</div>
    <div class="legal-massive">ALL RIGHTS RESERVED © <span id="year"></span></div>
    <div style="font-size: 0.7rem; margin-top: 15px; opacity: 0.5; font-weight: 900;">NO UNAUTHORIZED REPRODUCTION.</div>
  </div>
</footer>

<div class="ui-controls">
  <button class="ctrl-btn" id="themeBtn">INVERT</button>
</div>

<div class="lightbox" id="lightbox">
  <img id="lbImg" src="">
</div>

<script>
  const IMAGES = [
    { n: "1", w: "AMICUS", a: "MISC", top: true }, { n: "2", w: "EQUUS", a: "VROOM" },
    { n: "3", w: "SPIRITUS", a: "VROOM" }, { n: "4", w: "AURUM", a: "VROOM" },
    { n: "5", w: "FERRUM", a: "VROOM", top: true }, { n: "6", w: "VELOX", a: "VROOM" },
    { n: "7", w: "対称", a: "VROOM" }, { n: "8", w: "閃光", a: "VROOM", top: true },
    { n: "9", w: "METALLUM", a: "VROOM" }, { n: "10", w: "FORMA", a: "VROOM", top: true },
    { n: "11", w: "LUMEN", a: "VROOM" }, { n: "12", w: "ROTA", a: "VROOM" },
    { n: "13", w: "技術", a: "VROOM", top: true }, { n: "14", w: "TAURO", a: "VROOM", top: true },
    { n: "15", w: "ALBUS", a: "VROOM" }, { n: "16", w: "MACHINA", a: "VROOM" },
    { n: "17", w: "ITER", a: "VROOM", top: true }, { n: "18", w: "NOCTIS", a: "VROOM" },
    { n: "19", w: "VIA", a: "VROOM" }, { n: "20", w: "VETUSTUS", a: "VROOM" },
    { n: "21", w: "CURVA", a: "VROOM" }, { n: "22", w: "IGNIS", a: "VROOM", top: true },
    { n: "23", w: "木漏れ日", a: "NATURE", top: true }, { n: "24", w: "SILVA", a: "NATURE", top: true },
    { n: "25", w: "FOLIUM", a: "NATURE" }, { n: "26", w: "VIRIDIS", a: "NATURE" },
    { n: "27", w: "VORS", a: "VROOM" }, { n: "28", w: "CANUS", a: "VROOM" },
    { n: "29", w: "URBS", a: "VROOM" }, { n: "30", w: "SILENT", a: "VROOM" },
    { n: "31", w: "VESPER", a: "VROOM" }, { n: "32", w: "暗闇", a: "NOIR", top: true },
    { n: "33", w: "UMBRA", a: "NOIR" }, { n: "34", w: "LUX", a: "NOIR" },
    { n: "35", w: "魂", a: "NOIR", top: true }, { n: "36", w: "ARBOR", a: "NATURE" },
    { n: "37", w: "AETHER", a: "MISC", top: true }
  ];

  const gallery = document.getElementById('gallery');
  const navLeft = document.getElementById('navLeft');
  const shutter = document.getElementById('shutter');
  const lb = document.getElementById('lightbox');
  const systemTag = document.getElementById('system-tag');

  // SET SYSTEM LABEL
  const isMobile = window.innerWidth < 600;
  systemTag.textContent = isMobile ? "SYSTEM: MOBILE OPTIMIZED" : "SYSTEM: PC OPTIMIZED";

  // SCROLL FOCUS OBSERVER (För färg på mobil)
  const focusObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-focus');
      } else {
        entry.target.classList.remove('in-focus');
      }
    });
  }, { threshold: 0.6 });

  function render(filter) {
    shutter.style.transform = 'translateY(100%)';
    shutter.animate([ { transform: 'translateY(100%)' }, { transform: 'translateY(0%)', offset: 0.5 }, { transform: 'translateY(-100%)' } ], { duration: 500, easing: 'cubic-bezier(0.9, 0, 0.1, 1)' });

    setTimeout(() => {
      gallery.innerHTML = '';
      let filtered = filter === 'TOP' ? IMAGES.filter(i => i.top) : (filter === 'ALLT' ? IMAGES : IMAGES.filter(i => i.a === filter));
      
      document.querySelectorAll('nav button, #alltBtn').forEach(btn => {
        btn.setAttribute('aria-current', btn.textContent === filter ? 'true' : 'false');
      });

      filtered.forEach((img, i) => {
        const plate = document.createElement('div');
        plate.className = 'plate';
        plate.innerHTML = `<div class="frame"><img src="images/bild (${img.n}).jpg" loading="lazy"><div class="hud">#${img.n}</div></div>`;
        plate.onclick = () => {
          document.getElementById('lbImg').src = `images/bild (${img.n}).jpg`;
          lb.classList.add('active');
          document.body.style.overflow = 'hidden';
        };
        gallery.appendChild(plate);
        focusObserver.observe(plate);
        setTimeout(() => plate.classList.add('revealed'), i * 30);
      });
      window.scrollTo(0, 0);
    }, 250);
  }

  ['TOP', 'VROOM', 'NATURE', 'NOIR', 'MISC'].forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.onclick = () => render(cat);
    navLeft.appendChild(btn);
  });

  document.getElementById('alltBtn').onclick = () => render('ALLT');
  document.getElementById('logo').onclick = () => render('TOP');
  lb.onclick = () => { lb.classList.remove('active'); document.body.style.overflow = 'auto'; };
  
  document.getElementById('themeBtn').onclick = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  };

  document.getElementById('year').textContent = new Date().getFullYear();
  render('TOP');
</script>
</body>
</html>
