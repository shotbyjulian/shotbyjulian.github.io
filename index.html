<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JULIAN</title>
<meta name="description" content="JULIAN — fotografi. I. II. III.">
<meta property="og:title" content="JULIAN">
<meta property="og:description" content="fotografi. i. ii. iii.">
<meta property="og:image" content="images/bild (1).jpg">
<meta property="og:type" content="website">
<meta name="theme-color" content="#000000">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23000%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  /*
    Ye-referens: ingen dekoration. Ingen rundning. Inget crop.
    Vitt/svart. Grotesk. Bilden får hela ytan, i sitt eget format,
    ingen tvingas in i en ruta den inte hör hemma i.
  */
  :root {
    --bg: #000000;
    --text: #ffffff;
    --dim: #6b6b6b;
    --line: #262626;
    --gap: 2px;
    --sans: 'Helvetica Neue', Inter, Arial, sans-serif;
  }

  [data-theme="light"] {
    --bg: #ffffff;
    --text: #000000;
    --dim: #8c8c8c;
    --line: #dcdcdc;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 400;
    transition: background 0.3s linear, color 0.3s linear;
  }

  :focus-visible {
    outline: 1px solid var(--text);
    outline-offset: 2px;
  }

  a, button { font-family: var(--sans); }

  /* ---------- HEADER ---------- */
  header {
    padding: 56px 24px 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
  }

  .wordmark {
    font-size: clamp(3rem, 12vw, 9rem);
    font-weight: 500;
    letter-spacing: -0.04em;
    line-height: 0.9;
    text-transform: uppercase;
    color: var(--text);
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    text-align: left;
  }

  .meta-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 14px 0 40px;
    border-bottom: 1px solid var(--line);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .meta-count { color: var(--dim); }

  /* ---------- NAV ---------- */
  nav {
    display: flex;
    gap: 28px;
    padding: 20px 24px 20px;
    flex-wrap: wrap;
  }

  nav button {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
    cursor: pointer;
    position: relative;
  }

  nav button[aria-current="true"] {
    color: var(--text);
  }

  nav button[aria-current="true"]::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -8px;
    height: 1px;
    background: var(--text);
  }

  nav button:hover { color: var(--text); }

  /* ---------- GRID ---------- */
  main { padding: 0; }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--gap);
  }

  @media (min-width: 700px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 1200px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }

  .plate {
    position: relative;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  /* bilden visas i sitt eget format — ingen crop, ingen tvingad ruta */
  .plate .frame {
    width: 100%;
    background: color-mix(in srgb, var(--text) 4%, var(--bg));
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 120px;
  }

  .plate img {
    display: block;
    width: 100%;
    height: auto;
    max-height: 92vh;
    object-fit: contain; /* aldrig cover — aldrig crop */
    opacity: 0;
    transition: opacity 0.5s ease;
    cursor: zoom-in;
  }

  .plate img.loaded { opacity: 1; }

  .plate-caption {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 14px 22px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .plate-caption .cap-title { color: var(--text); }

  .plate.broken .frame {
    min-height: 200px;
    color: var(--dim);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .empty-state {
    padding: 160px 24px;
    text-align: center;
    color: var(--dim);
    font-size: 0.85rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* ---------- CONTROLS ---------- */
  .theme-toggle {
    position: fixed; top: 24px; right: 24px;
    background: none; border: 1px solid var(--line);
    padding: 8px 16px;
    cursor: pointer; z-index: 1100; color: var(--text);
    font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
  }
  .theme-toggle:hover { border-color: var(--text); }

  /* ---------- LIGHTBOX ---------- */
  .lightbox {
    position: fixed; inset: 0; background: var(--bg);
    display: none; align-items: center; justify-content: center; z-index: 2000;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 94vw; max-height: 86vh;
    object-fit: contain;
  }

  .lb-btn {
    position: absolute;
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1rem;
  }
  .lb-btn:hover { border-color: var(--text); }
  .lb-close { top: 24px; right: 24px; }
  .lb-prev { left: 24px; top: 50%; transform: translateY(-50%); }
  .lb-next { right: 24px; top: 50%; transform: translateY(-50%); }

  .lb-info {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: var(--dim);
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .lb-info .lb-title { color: var(--text); display: block; margin-bottom: 6px; }

  @media (max-width: 600px) {
    .lb-prev, .lb-next, .lb-close { width: 38px; height: 38px; font-size: 0.85rem; }
  }

  footer {
    padding: 60px 24px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
  }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" type="button" aria-label="Växla mellan mörkt och ljust läge">MODE</button>

<header>
  <button class="wordmark" id="mainLogo" type="button">JULIAN</button>
  <div class="meta-row">
    <span>FOTOGRAFI</span>
    <span class="meta-count" id="metaCount"></span>
  </div>
</header>

<nav id="albumNav" aria-label="Album"></nav>

<main>
  <div id="gallery" class="grid" aria-live="polite"></div>
</main>

<footer>
  <span>JULIAN</span>
  <span id="year"></span>
</footer>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Bildvisare">
  <button class="lb-btn lb-close" id="lbClose" aria-label="Stäng" type="button">✕</button>
  <button class="lb-btn lb-prev" id="lbPrev" aria-label="Föregående" type="button">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-btn lb-next" id="lbNext" aria-label="Nästa" type="button">›</button>
  <div class="lb-info">
    <span class="lb-title" id="lbTitle"></span>
    <span id="lbCounter"></span>
  </div>
</div>

<script>
  /*
    Tre kapitel. Inga leende albumnamn — bara nummer och en rad.
    I.   RÅTT       (garage-serien)
    II.  RÖRELSE    (strövtåg-serien)
    III. MÖRKER     (nocturne-serien)
  */

  const ALBUMS = {
    ratt: {
      label: 'I. VROOM',
      files: [
        "bild (27).jpg","bild (28).jpg","bild (29).jpg","bild (30).jpg","bild (31).jpg",
        "bild (2).jpg","bild (3).jpg","bild (4).jpg","bild (5).jpg","bild (6).jpg","bild (7).jpg",
        "bild (8).jpg","bild (9).jpg","bild (10).jpg","bild (11).jpg","bild (12).jpg",
        "bild (13).jpg","bild (14).jpg","bild (15).jpg","bild (16).jpg","bild (17).jpg","bild (18).jpg",
        "bild (19).jpg","bild (20).jpg","bild (21).jpg","bild (22).jpg"
      ]
    },
    rorelse: {
      label: 'II. MISCELLANEOUS',
      files: [
        "bild (23).jpg","bild (24).jpg","bild (25).jpg","bild (26).jpg",
        "bild (37).jpg","bild (36).jpg","bild (1).jpg"
      ]
    },
    morker: {
      label: 'III. NOIR',
      files: ["bild (32).jpg","bild (33).jpg","bild (34).jpg","bild (35).jpg"]
    }
  };

  const gallery = document.getElementById('gallery');
  const metaCount = document.getElementById('metaCount');
  const albumNav = document.getElementById('albumNav');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbTitle = document.getElementById('lbTitle');
  const lbCounter = document.getElementById('lbCounter');

  let currentFiles = [];
  let currentIndex = -1;

  function initTheme() {
    const saved = localStorage.getItem('theme');
    const preferred = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', preferred);
  }
  document.getElementById('themeToggle').onclick = () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  };
  initTheme();

  function buildNav() {
    albumNav.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.textContent = 'ALLT';
    allBtn.dataset.key = 'all';
    allBtn.onclick = () => { location.hash = 'all'; };
    albumNav.appendChild(allBtn);

    Object.keys(ALBUMS).forEach(key => {
      const btn = document.createElement('button');
      btn.textContent = ALBUMS[key].label;
      btn.dataset.key = key;
      btn.onclick = () => { location.hash = key; };
      albumNav.appendChild(btn);
    });
  }

  function markActiveNav(key) {
    [...albumNav.children].forEach(btn => {
      if (btn.dataset.key === key) btn.setAttribute('aria-current', 'true');
      else btn.removeAttribute('aria-current');
    });
  }

  // Ordningen är fast — kronologin är delen av arbetet. Ingen slump.
  const allFiles = [
    ...ALBUMS.ratt.files.map(f => ({ file: f, album: ALBUMS.ratt.label })),
    ...ALBUMS.rorelse.files.map(f => ({ file: f, album: ALBUMS.rorelse.label })),
    ...ALBUMS.morker.files.map(f => ({ file: f, album: ALBUMS.morker.label }))
  ];

  function render() {
    const key = location.hash.replace('#', '') || 'all';
    let entries;

    if (key === 'all' || !ALBUMS[key]) {
      entries = allFiles;
      markActiveNav('all');
    } else {
      entries = ALBUMS[key].files.map(f => ({ file: f, album: ALBUMS[key].label }));
      markActiveNav(key);
    }

    currentFiles = entries;
    metaCount.textContent = String(entries.length).padStart(2, '0');

    gallery.innerHTML = '';

    if (!entries.length) {
      gallery.innerHTML = '<p class="empty-state">Inga bilder i detta kapitel</p>';
      return;
    }

    entries.forEach((entry, i) => {
      const plate = document.createElement('div');
      plate.className = 'plate';

      const frame = document.createElement('div');
      frame.className = 'frame';

      const img = document.createElement('img');
      img.alt = `${entry.album} — plansch ${i + 1}`;
      img.loading = 'lazy';
      img.decoding = 'async';

      const tryPaths = [`images/${entry.file}`, `bilder/${entry.file}`, entry.file];
      let pIdx = 0;
      img.src = tryPaths[pIdx];

      img.onload = () => img.classList.add('loaded');
      img.onerror = () => {
        pIdx++;
        if (pIdx < tryPaths.length) {
          img.src = tryPaths[pIdx];
        } else {
          plate.classList.add('broken');
          frame.textContent = 'BILD SAKNAS';
        }
      };

      img.onclick = () => openLightbox(i);
      frame.appendChild(img);

      const caption = document.createElement('div');
      caption.className = 'plate-caption';
      caption.innerHTML = `<span class="cap-title">${entry.album}</span><span>${String(i + 1).padStart(2, '0')}</span>`;

      plate.appendChild(frame);
      plate.appendChild(caption);
      gallery.appendChild(plate);
    });
  }

  function openLightbox(index) {
    currentIndex = index;
    showCurrent();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('lbClose').focus();
  }

  function showCurrent() {
    const entry = currentFiles[currentIndex];
    const galleryImg = gallery.children[currentIndex]?.querySelector('img');
    lbImg.src = galleryImg ? galleryImg.src : `images/${entry.file}`;
    lbImg.alt = galleryImg ? galleryImg.alt : '';
    lbTitle.textContent = entry.album;
    lbCounter.textContent = `${String(currentIndex + 1).padStart(2, '0')} / ${String(currentFiles.length).padStart(2, '0')}`;
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = 'auto';
  }

  function nextImage(dir) {
    if (!currentFiles.length) return;
    currentIndex = (currentIndex + dir + currentFiles.length) % currentFiles.length;
    showCurrent();
  }

  document.getElementById('lbClose').onclick = closeLightbox;
  document.getElementById('lbPrev').onclick = () => nextImage(-1);
  document.getElementById('lbNext').onclick = () => nextImage(1);

  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

  window.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') nextImage(-1);
    if (e.key === 'ArrowRight') nextImage(1);
  });

  let touchStartX = 0;
  lightbox.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
  lightbox.addEventListener('touchend', (e) => {
    const diff = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(diff) > 50) nextImage(diff > 0 ? -1 : 1);
  });

  document.getElementById('mainLogo').onclick = () => { location.hash = 'all'; };

  window.addEventListener('hashchange', render);
  document.getElementById('year').textContent = new Date().getFullYear();

  buildNav();
  render();
</script>

</body>
</html>
