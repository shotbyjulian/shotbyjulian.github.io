<!DOCTYPE html>
<html lang="sv" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOT BY JULIAN — ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Archivo:wght@300;400;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4df; --text: #1a1a18; --text-muted: #878480;
    --line: rgba(0,0,0,0.08); --accent: #1a1a18;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  [data-theme="dark"] {
    --bg: #121211; --text: #e8e4df; --text-muted: #6b6965;
    --line: rgba(255,255,255,0.08); --accent: #e8e4df;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background-color: var(--bg); color: var(--text);
    font-family: 'Archivo', sans-serif; transition: background-color 0.8s var(--ease);
    overflow-x: hidden;
  }

  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; }
  .serif { font-family: 'Fraunces', serif; }

  /* --- Navigation --- */
  header {
    position: fixed; top: 0; width: 100%; z-index: 500;
    display: flex; justify-content: space-between; align-items: center;
    padding: 30px clamp(20px, 5vw, 60px); mix-blend-mode: difference; color: #fff;
  }

  .nav-group { display: flex; gap: 20px; align-items: center; }
  .nav-btn { cursor: pointer; border: 1px solid rgba(255,255,255,0.3); padding: 4px 8px; border-radius: 4px; transition: 0.3s; }
  .nav-btn:hover { background: #fff; color: #000; }

  .info-trigger {
    width: 32px; height: 32px; border: 1px solid #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); } 70% { box-shadow: 0 0 0 10px rgba(255,255,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }

  /* --- Hero --- */
  .hero {
    height: 100svh; width: 100%; position: relative;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; background: #000;
  }
  #heroImg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
  .hero-title { position: relative; z-index: 10; font-family: 'Fraunces', serif; font-size: clamp(3rem, 12vw, 10rem); font-style: italic; color: #fff; text-align: center; line-height: 0.85; pointer-events: none; }

  /* --- Gallery Filter Bar --- */
  .gallery-nav {
    padding: 80px clamp(20px, 5vw, 60px) 20px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0;
    background: var(--bg); z-index: 400; display: flex; justify-content: space-between; align-items: baseline;
  }
  .filters { display: flex; gap: 20px; flex-wrap: wrap; }
  .filters button {
    cursor: pointer; border: none; background: none; color: var(--text-muted);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
    transition: 0.4s var(--ease); padding: 5px 0; border-bottom: 1px solid transparent;
  }
  .filters button.active { color: var(--text); border-bottom-color: var(--text); }

  /* --- Grid --- */
  .gallery-grid {
    padding: 60px clamp(20px, 5vw, 60px);
    display: grid; grid-template-columns: repeat(12, 1fr); gap: 60px 30px;
  }
  .item { grid-column: span 12; cursor: pointer; transition: 0.8s var(--ease); }
  @media (min-width: 768px) {
    .item { grid-column: span 4; }
    .item.large { grid-column: span 8; }
  }

  .item-img {
    width: 100%; aspect-ratio: 4/5; overflow: hidden; background: var(--line);
    margin-bottom: 12px; position: relative; transition: 0.6s var(--ease);
  }
  .item-img img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s var(--ease); }
  .item:hover .item-img { transform: translateY(-10px); }
  .item:hover img { transform: scale(1.05); }

  /* --- Focus Mode --- */
  .item.focused {
    position: fixed; inset: 0; z-index: 1000; padding: 40px; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .item.focused .item-img { width: auto; height: 100%; aspect-ratio: auto; margin: 0; }
  .item.focused img { width: auto; height: 100%; max-width: 90vw; object-fit: contain; }

  /* --- Info Overlay --- */
  .info-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
    display: none; align-items: center; justify-content: center; color: #fff; padding: 40px;
  }
  .info-overlay.active { display: flex; animation: fadeIn 0.4s var(--ease); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .info-content { max-width: 500px; text-align: center; background: #fff; color: #000; padding: 40px; border-radius: 8px; }
  .info-content h2 { font-family: 'Fraunces', serif; font-size: 2rem; margin-bottom: 15px; font-style: italic; }
  .info-content p { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; line-height: 1.8; margin-bottom: 30px; }
  
  .close-btn { 
    background: #000; color: #fff; border: none; padding: 12px 30px; 
    cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; border-radius: 4px;
    transition: 0.3s;
  }
  .close-btn:hover { transform: scale(1.05); opacity: 0.9; }

  .reveal { opacity: 0; transform: translateY(40px); transition: 1s var(--ease); }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="serif" style="font-size: 1.2rem;">SBJ</div>
  <div class="nav-group">

    <div class="mono nav-btn" id="themeBtn">Mode</div>
    <div class="info-trigger" id="infoBtn">?</div>
  </div>
</header>

<section class="hero">

  <h1 class="hero-title" id="mainTitle">Archive<br>Chronicles</h1>
</section>

<div class="gallery-nav">

<main class="gallery-grid" id="grid"></main>
