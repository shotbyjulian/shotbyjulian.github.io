<!DOCTYPE html>
<html lang="sv" data-theme="dark" style="background-color: #121211;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" id="metaTheme" content="#121211">
<title>SHOT BY JULIAN — ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Archivo:wght@300;400;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4df; --text: #1a1a18; --text-muted: #878480;
    --line: rgba(0,0,0,0.08); --concrete: #c4c2bc;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  [data-theme="dark"] {
    --bg: #121211; --text: #e8e4df; --text-muted: #6b6965;
    --line: rgba(255,255,255,0.08); --concrete: #2a2a28;
  }

  html, body { 
    background-color: var(--bg); 
    color: var(--text);
    margin: 0; padding: 0;
    min-height: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Archivo', sans-serif; 
    transition: background-color 0.8s var(--ease);
    overflow-x: hidden; perspective: 1200px;
  }

  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; }
  .serif { font-family: 'Fraunces', serif; }

  /* --- Utspridd Header --- */
  header {
    position: fixed; top: 0; width: 100%; z-index: 2000;
    display: flex; justify-content: space-between; align-items: center;
    padding: env(safe-area-inset-top, 20px) clamp(20px, 5vw, 60px) 20px; 
    mix-blend-mode: difference; color: #fff;
  }
  .header-item { cursor: pointer; transition: 0.3s; }
  .nav-btn-outline { border: 1px solid rgba(255,255,255,0.3); padding: 5px 12px; border-radius: 4px; }
  .nav-btn-outline:hover { background: #fff; color: #000; }

  /* --- Hero --- */
  .hero { height: 100svh; width: 100%; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #000; }
  #heroImg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.45; pointer-events: none; }
  .hero-title { position: relative; z-index: 10; font-family: 'Fraunces', serif; font-size: clamp(3rem, 15vw, 12rem); font-style: italic; color: #fff; text-align: center; line-height: 0.8; pointer-events: none; }

  /* --- Filter Bar --- */
  .gallery-nav {
    padding: 25px clamp(20px, 5vw, 60px);
    border-bottom: 1px solid var(--line); position: sticky; top: 0;
    background: var(--bg); z-index: 1500;
    display: flex; justify-content: space-between; align-items: center;
    backdrop-filter: blur(10px);
  }
  .filters { display: flex; gap: 18px; flex-wrap: wrap; }
  .filters button { cursor: pointer; border: none; background: none; color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase; transition: 0.3s; padding: 5px 0; }
  .filters button.active { color: var(--text); border-bottom: 1px solid var(--text); }

  /* --- Grid --- */
  .gallery-grid { padding: 40px clamp(20px, 5vw, 60px) 100px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 60px 30px; }
  .item { grid-column: span 12; cursor: pointer; position: relative; z-index: 1; }
  @media (min-width: 768px) { .item { grid-column: span 4; } .item.large { grid-column: span 8; } }

  .item-img-wrap {
    padding: 10px; background-color: var(--concrete);
    border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    transition: transform 0.15s ease-out; transform-style: preserve-3d;
  }
  .item-img { position: relative; width: 100%; aspect-ratio: 4/5; overflow: hidden; background: #222; }
  .item-img img { width: 100%; height: 100%; object-fit: cover; transition: 1s var(--ease); }
  
  .item-img::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/Noise_600x600.png");
    opacity: 0.08; mix-blend-mode: overlay; z-index: 2;
  }

  /* --- Fokusläge --- */
  .item.focused {
    position: fixed; inset: 0; z-index: 3000; padding: 40px; background: var(--bg);
    display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh;
  }
  .item.focused .item-img-wrap { height: 80vh; width: auto; transform: none !important; }
  .item.focused img { height: 100%; width: auto; max-width: 90vw; object-fit: contain; }

  /* --- Info Popup --- */
  .info-overlay {
    position: fixed; inset: 0; z-index: 4000;
    display: none; align-items: center; justify-content: center; padding: 40px;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
  }
  .info-overlay.active { display: flex; }
  .info-content { 
    max-width: 400px; width: 100%; text-align: center; 
    background: var(--bg); color: var(--text); 
    padding: 40px; border-radius: 8px; border: 1px solid var(--line);
  }
  .close-btn { 
    background: var(--text); color: var(--bg); 
    border: none; padding: 15px 40px; margin-top: 25px; 
    cursor: pointer; border-radius: 4px; font-weight: 600;
  }

  .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s var(--ease); }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="serif header-item" style="font-size: 1.2rem; font-style: italic;">SBJ</div>
  <div class="mono header-item nav-btn-outline" id="langBtn">EN</div>
  <div class="mono header-item nav-btn-outline" id="themeBtn">Mode</div>
  <div class="header-item nav-btn-outline" id="infoBtn" style="border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;">?</div>
</header>

<section class="hero">
  <img id="heroImg" src="" alt="">
  <h1 class="hero-title">Shot by Julian</h1>
</section>

<div class="gallery-nav">
  <div class="filters" id="filters"></div>
  <div class="mono" id="count">00 Plates</div>
</div>

<main class="gallery-grid" id="grid"></main>

<div class="info-overlay" id="infoOverlay">
  <div class="info-content">
    <h2 class="serif" id="infoTitle" style="font-size: 2rem; margin-bottom: 15px;">Motion</h2>
    <p class="mono" id="infoText" style="line-height: 1.8; opacity: 0.8; font-size: 0.75rem;"></p>
    <button class="close-btn mono" id="closeInfo">STARTA</button>
  </div>
</div>

<script>
  // FULLSTÄNDIGT ARKIV (1-43)
  const DATA = Array.from({length: 43}, (_, i) => {
    const n = i + 1;
    let a = "VROOM";
    if ([23,24,25,26,36].includes(n)) a = "NATURE";
    if ([32,33,34,35].includes(n)) a = "NOIR";
    if ([1,37].includes(n)) a = "MISC";
    if (n >= 38) a = "BERLIN";
    const img = { n: String(n), a: a };
    if (n === 38) img.f = "IMG_9234.jpeg";
    if (n === 39) img.f = "IMG_9235.jpeg";
    if (n === 40) img.f = "IMG_9236.jpeg";
    if (n === 41) img.f = "IMG_9237.jpeg";
    if (n === 42) img.f = "IMG_9238.jpeg";
    if (n === 43) img.f = "IMG_9239.jpeg";
    return img;
  }).sort(() => Math.random() - 0.5);

  let lang = 'SV';
  const TEXTS = {
    SV: { guideTitle: "Rörelse", guideText: "Vinkla telefonen för att flytta perspektivet i bilderna. Klicka på en bild för att fokusera.", close: "STARTA", plates: "Plåtar" },
    EN: { guideTitle: "Motion", guideText: "Tilt your phone to shift the image perspective. Click any image to focus.", close: "START", plates: "Plates" }
  };

  let currentFilter = "BERLIN";

  function getSrc(img) { return img.f ? `images/${img.f}` : `images/bild (${img.n}).jpg`; }

  // --- Gyro Permission ---
  async function requestGyro() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const response = await DeviceOrientationEvent.requestPermission();
        if (response === 'granted') {
          window.addEventListener('deviceorientation', handleGyro);
        }
      } catch (e) { console.error(e); }
    } else {
      window.addEventListener('deviceorientation', handleGyro);
    }
  }

  function handleGyro(e) {
    if(window.innerWidth > 768) return;
    const x = Math.min(Math.max(e.beta, -30), 30) / 2;
    const y = Math.min(Math.max(e.gamma, -30), 30) / 2;
    document.querySelectorAll('.item-img-wrap').forEach(wrap => {
      if(!wrap.closest('.focused')) wrap.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
    });
  }

  // --- PC Tilt ---
  function initTilt(el) {
    el.addEventListener('mousemove', (e) => {
      if(window.innerWidth < 768 || el.classList.contains('focused')) return;
      const box = el.getBoundingClientRect();
      const x = (e.clientX - box.left) / box.width - 0.5;
      const y = (e.clientY - box.top) / box.height - 0.5;
      el.querySelector('.item-img-wrap').style.transform = `rotateY(${x * 20}deg) rotateX(${y * -20}deg)`;
    });
    el.addEventListener('mouseleave', () => {
      el.querySelector('.item-img-wrap').style.transform = `rotateY(0deg) rotateX(0deg)`;
    });
  }

  // --- Theme & Lang ---
  const metaTheme = document.getElementById('metaTheme');
  document.getElementById('themeBtn').onclick = () => {
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
    const bgCol = t === 'dark' ? '#121211' : '#e8e4df';
    document.documentElement.style.backgroundColor = bgCol;
    metaTheme.setAttribute('content', bgCol);
  };

  document.getElementById('langBtn').onclick = function() {
    lang = lang === 'SV' ? 'EN' : 'SV';
    this.textContent = lang === 'SV' ? 'EN' : 'SV';
    updateLanguage();
  };

  function updateLanguage() {
    const t = TEXTS[lang];
    document.getElementById('infoTitle').textContent = t.guideTitle;
    document.getElementById('infoText').innerHTML = t.guideText;
    document.getElementById('closeInfo').textContent = t.close;
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const filtered = currentFilter === 'ALL' ? DATA : DATA.filter(i => i.a === currentFilter);
    grid.innerHTML = '';
    document.getElementById('count').textContent = `${filtered.length} ${TEXTS[lang].plates}`;

    filtered.forEach((img, idx) => {
      const el = document.createElement('div');
      el.className = `item reveal ${idx % 8 === 0 ? 'large' : ''}`;
      el.innerHTML = `
        <div class="item-img-wrap">
          <div class="item-img"><img src="${getSrc(img)}" loading="lazy"></div>
        </div>
        <div class="mono" style="margin-top:10px; opacity:0.6">— PL ${img.n.padStart(2, '0')}</div>
      `;
      el.onclick = () => {
        el.classList.toggle('focused');
        document.body.style.overflow = el.classList.contains('focused') ? 'hidden' : 'auto';
      };
      grid.appendChild(el);
      initTilt(el);
      observer.observe(el);
    });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('is-visible'); });
  }, { threshold: 0.1 });

  // Filters
  const filtersEl = document.getElementById('filters');
  ["BERLIN", "VROOM", "NATURE", "NOIR", "MISC", "ALL"].forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.className = cat === currentFilter ? 'active' : '';
    btn.onclick = () => {
      currentFilter = cat;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
    filtersEl.appendChild(btn);
  });

  // Start-up Info Overlay
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      document.getElementById('infoOverlay').classList.add('active');
    }, 600);
  });

  document.getElementById('infoBtn').onclick = () => document.getElementById('infoOverlay').classList.add('active');
  document.getElementById('closeInfo').onclick = () => {
    document.getElementById('infoOverlay').classList.remove('active');
    requestGyro();
  };

  // Hero Flash
  const hImg = document.getElementById('heroImg');
  let hi = 0;
  setInterval(() => { hi = (hi + 1) % DATA.length; hImg.src = getSrc(DATA[hi]); }, 120);

  updateLanguage();
</script>
</body>
</html>
