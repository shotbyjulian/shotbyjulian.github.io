<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBJ — Shot by Julian</title>
<style>
  :root {
    --bg: #050505;
    --text: #ffffff;
    --dim: #555555;
    --line: #1a1a1a;
    --gap: 2px;
    --sans: 'Helvetica Neue', Inter, Arial, sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  [data-theme="light"] {
    --bg: #fdfdfd;
    --text: #000000;
    --dim: #a0a0a0;
    --line: #eeeeee;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--sans); overflow-x: hidden;
    transition: background 0.6s var(--ease);
  }

  /* --- NATURAL GRAIN EFFECT --- */
  .grain {
    position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.045; pointer-events: none; z-index: 9999;
    animation: noise 0.2s steps(2) infinite;
  }
  @keyframes noise {
    0% { transform: translate(0,0); }
    10% { transform: translate(-1%,-1%); }
    30% { transform: translate(1%,1%); }
    50% { transform: translate(-0.5%,1.5%); }
    70% { transform: translate(1.5%,0.5%); }
    90% { transform: translate(-1%,0.5%); }
    100% { transform: translate(0,0); }
  }

  header { padding: 80px 24px 20px; }
  .wordmark {
    font-size: clamp(4rem, 15vw, 12rem); font-weight: 600;
    letter-spacing: -0.04em; text-transform: uppercase;
    cursor: pointer; line-height: 0.8;
  }

  nav { display: flex; gap: 30px; padding: 40px 24px; flex-wrap: wrap; border-bottom: 1px solid var(--line); }
  nav button {
    background: none; border: none; padding: 0; font-size: 0.7rem;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
    cursor: pointer; transition: color 0.4s var(--ease), transform 0.4s var(--ease);
  }
  nav button:hover { color: var(--text); transform: translateY(-1px); }
  nav button[aria-current="true"] { color: var(--text); font-weight: 600; }

  /* --- GRID & PLATES --- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: var(--gap); }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

  .plate {
    position: relative; opacity: 0; transform: translateY(30px) scale(0.98);
    transition: opacity 1.2s var(--ease), transform 1.2s var(--ease);
    overflow: hidden; cursor: zoom-in;
  }
  .plate.revealed { opacity: 1; transform: translateY(0) scale(1); }

  .frame { width: 100%; aspect-ratio: 4/5; background: #111; overflow: hidden; position: relative; }
  .plate img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 1.5s var(--ease), filter 0.8s var(--ease);
  }
  .plate:hover img { transform: scale(1.05); filter: contrast(1.1); }

  .caption {
    position: absolute; bottom: 0; left: 0; width: 100%;
    padding: 30px 20px; background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    color: white; transform: translateY(10px); opacity: 0;
    transition: all 0.6s var(--ease); pointer-events: none;
  }
  .plate:hover .caption { transform: translateY(0); opacity: 1; }
  .cap-word { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.05em; }

  /* --- LIGHTBOX --- */
  .lightbox {
    position: fixed; inset: 0; background: var(--bg); z-index: 10000;
    display: none; align-items: center; justify-content: center; opacity: 0;
    transition: opacity 0.5s var(--ease);
  }
  .lightbox.active { display: flex; opacity: 1; }
  .lb-img { max-width: 90vw; max-height: 85vh; transform: scale(0.95); transition: transform 0.6s var(--ease); }
  .lightbox.active .lb-img { transform: scale(1); }

  .lb-word {
    position: absolute; bottom: 50px; font-size: 0.8rem;
    letter-spacing: 0.4em; text-transform: uppercase; color: var(--dim);
  }

  .ui-btn {
    position: fixed; top: 30px; padding: 10px 15px; background: none;
    border: 1px solid var(--line); color: var(--text); cursor: pointer;
    font-size: 0.6rem; letter-spacing: 0.2em; z-index: 11000;
  }
  #themeToggle { right: 30px; }
  #monoToggle { right: 120px; }

  html.mono img { filter: grayscale(1) !important; }
</style>
</head>
<body>

<div class="grain"></div>
<button class="ui-btn" id="themeToggle">MODE</button>
<button class="ui-btn" id="monoToggle">B&W</button>

<header>
  <div class="wordmark" id="logo">SBJ</div>
</header>

<nav id="nav"></nav>

<main>
  <div id="gallery" class="grid"></div>
</main>

<div class="lightbox" id="lightbox">
  <img class="lb-img" id="lbImg" src="">
  <div class="lb-word" id="lbWord">WORD</div>
</div>

<script>
  const IMAGES = [
    { n: "1", w: "AMICUS", a: "MISC" },
    { n: "2", w: "EQUUS", a: "VROOM" },
    { n: "3", w: "SPIRITUS", a: "VROOM" },
    { n: "4", w: "AURUM", a: "VROOM" },
    { n: "5", w: "FERRUM", a: "VROOM" },
    { n: "6", w: "VELOX", a: "VROOM" },
    { n: "7", w: "対称", a: "VROOM" },
    { n: "8", w: "閃光", a: "VROOM" },
    { n: "9", w: "METALLUM", a: "VROOM" },
    { n: "10", w: "FORMA", a: "VROOM" },
    { n: "11", w: "LUMEN", a: "VROOM" },
    { n: "12", w: "ROTA", a: "VROOM" },
    { n: "13", w: "技術", a: "VROOM" },
    { n: "14", w: "TAURO", a: "VROOM" },
    { n: "15", w: "ALBUS", a: "VROOM" },
    { n: "16", w: "MACHINA", a: "VROOM" },
    { n: "17", w: "ITER", a: "VROOM" },
    { n: "18", w: "NOCTIS", a: "VROOM" },
    { n: "19", w: "VIA", a: "VROOM" },
    { n: "20", w: "VETUSTUS", a: "VROOM" },
    { n: "21", w: "CURVA", a: "VROOM" },
    { n: "22", w: "IGNIS", a: "VROOM" },
    { n: "23", w: "木漏れ日", a: "NATURE" },
    { n: "24", w: "SILVA", a: "NATURE" },
    { n: "25", w: "FOLIUM", a: "NATURE" },
    { n: "26", w: "VIRIDIS", a: "NATURE" },
    { n: "27", w: "VORSPRUNG", a: "VROOM" },
    { n: "28", w: "CANUS", a: "VROOM" },
    { n: "29", w: "URBS", a: "VROOM" },
    { n: "30", w: "SILENTIUM", a: "VROOM" },
    { n: "31", w: "VESPER", a: "VROOM" },
    { n: "32", w: "暗闇", a: "NOIR" },
    { n: "33", w: "UMBRA", a: "NOIR" },
    { n: "34", w: "LUX", a: "NOIR" },
    { n: "35", w: "魂", a: "NOIR" },
    { n: "36", w: "ARBOR", a: "NATURE" },
    { n: "37", w: "AETHER", a: "MISC" }
  ];

  const gallery = document.getElementById('gallery');
  const nav = document.getElementById('nav');
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbWord = document.getElementById('lbWord');

  function render(filter = 'ALL') {
    gallery.innerHTML = '';
    const filtered = filter === 'ALL' ? IMAGES : IMAGES.filter(i => i.a === filter);
    
    filtered.forEach((img, i) => {
      const plate = document.createElement('div');
      plate.className = 'plate';
      plate.innerHTML = `
        <div class="frame">
          <img src="images/bild (${img.n}).jpg" loading="lazy">
          <div class="caption"><div class="cap-word">${img.w}</div></div>
        </div>
      `;
      plate.onclick = () => {
        lbImg.src = `images/bild (${img.n}).jpg`;
        lbWord.textContent = img.w;
        lb.classList.add('active');
      };
      gallery.appendChild(plate);
      
      // Staggered reveal animation
      setTimeout(() => plate.classList.add('revealed'), i * 80);
    });
  }

  // Navigation setup
  ['ALL', 'VROOM', 'NATURE', 'NOIR', 'MISC'].forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.onclick = () => {
      document.querySelectorAll('nav button').forEach(b => b.removeAttribute('aria-current'));
      btn.setAttribute('aria-current', 'true');
      render(cat);
    };
    if(cat === 'ALL') btn.setAttribute('aria-current', 'true');
    nav.appendChild(btn);
  });

  lb.onclick = () => lb.classList.remove('active');

  document.getElementById('themeToggle').onclick = () => {
    const current = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  };

  document.getElementById('monoToggle').onclick = () => {
    document.documentElement.classList.toggle('mono');
  };

  document.getElementById('logo').onclick = () => render('ALL');

  render();
</script>
</body>
</html>
