<!DOCTYPE html>
<html lang="sv" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOT BY JULIAN — ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Archivo:wght@300;400;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4df; --text: #1a1a18; --text-muted: #878480;
    --line: rgba(0,0,0,0.08); --concrete: #c4c2bc;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  [data-theme="dark"] {
    --bg: #121211; --text: #e8e4df; --text-muted: #6b6965;
    --line: rgba(255,255,255,0.08); --concrete: #2a2a28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg); color: var(--text);
    font-family: 'Archivo', sans-serif; transition: background-color 0.8s var(--ease);
    overflow-x: hidden; perspective: 1200px;
  }

  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; }
  .serif { font-family: 'Fraunces', serif; }

  /* --- Navigation --- */
  header {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    display: flex; justify-content: space-between; align-items: center;
    padding: 30px clamp(20px, 5vw, 60px); mix-blend-mode: difference; color: #fff;
  }
  .nav-group { display: flex; gap: 15px; }
  .nav-btn { cursor: pointer; border: 1px solid rgba(255,255,255,0.3); padding: 5px 12px; border-radius: 4px; transition: 0.3s; }
  .nav-btn:hover { background: #fff; color: #000; }

  /* --- Hero --- */
  .hero { height: 100svh; width: 100%; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #000; }
  #heroImg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.45; }
  .hero-title { position: relative; z-index: 10; font-family: 'Fraunces', serif; font-size: clamp(3rem, 15vw, 12rem); font-style: italic; color: #fff; text-align: center; line-height: 0.8; pointer-events: none; }

  /* --- Filter Bar --- */
  .gallery-nav {
    padding: 80px clamp(20px, 5vw, 60px) 20px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0;
    background: var(--bg); z-index: 900; display: flex; justify-content: space-between; align-items: baseline;
    transition: background 0.8s var(--ease);
  }
  .filters { display: flex; gap: 20px; flex-wrap: wrap; }
  .filters button { cursor: pointer; border: none; background: none; color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase; transition: 0.3s; }
  .filters button.active { color: var(--text); font-weight: 600; border-bottom: 1px solid var(--text); }

  /* --- Betongram & Grid --- */
  .gallery-grid { padding: 60px clamp(20px, 5vw, 60px); display: grid; grid-template-columns: repeat(12, 1fr); gap: 80px 40px; }
  .item { grid-column: span 12; cursor: pointer; position: relative; transition: opacity 0.5s var(--ease); }
  @media (min-width: 768px) { .item { grid-column: span 4; } .item.large { grid-column: span 8; } }

  .item-img-wrap {
    position: relative; overflow: hidden;
    padding: 12px; /* Betongrammen */
    background-color: var(--concrete);
    border: 1px solid rgba(0,0,0,0.05);
    box-shadow: 0 15px 45px rgba(0,0,0,0.1);
    transition: transform 0.2s ease-out;
    transform-style: preserve-3d;
  }

  .item-img { position: relative; width: 100%; aspect-ratio: 4/5; overflow: hidden; background: #222; }
  .item.tall .item-img { aspect-ratio: 2/3; }
  .item-img img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s var(--ease); }

  /* --- Statiskt Korn (Endast på bilder) --- */
  .item-img::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/Noise_600x600.png");
    opacity: 0.08; mix-blend-mode: overlay; z-index: 2;
  }

  .item:hover img { transform: scale(1.08); }

  /* --- Fokusläge Fix --- */
  .item.focused {
    position: fixed; inset: 0; z-index: 2000; padding: 5vh 5vw; background: var(--bg);
    display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh;
  }
  .item.focused .item-img-wrap { width: auto; height: 100%; transform: none !important; }
  .item.focused .item-img { height: 100%; aspect-ratio: auto; width: auto; }
  .item.focused img { height: 100%; width: auto; max-width: 90vw; object-fit: contain; }

  /* --- Info Popup --- */
  .info-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000;
    display: none; align-items: center; justify-content: center; padding: 40px;
  }
  .info-overlay.active { display: flex; animation: fadeIn 0.4s var(--ease); }
  .info-content { max-width: 450px; text-align: center; background: #fff; color: #000; padding: 40px; border-radius: 4px; }
  .close-btn { background: #000; color: #fff; border: none; padding: 12px 30px; margin-top: 20px; cursor: pointer; }

  .reveal { opacity: 0; transform: translateY(40px); transition: 1s var(--ease); }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<header>
  <div class="serif" style="font-size: 1.2rem; font-style: italic;">SBJ</div>
  <div class="nav-group">
    <div class="mono nav-btn" id="langBtn">EN</div>
    <div class="mono nav-btn" id="themeBtn">Mode</div>
    <div class="nav-btn" id="infoBtn">?</div>
  </div>
</header>

<section class="hero">
  <img id="heroImg" src="" alt="">
  <h1 class="hero-title">Shot by Julian</h1>
</section>

<div class="gallery-nav">
  <div class="filters" id="filters"></div>
  <div class="mono" id="count">00 Plates</div>
</div>

<main class="gallery-grid" id="grid"></main>

<div class="info-overlay" id="infoOverlay">
  <div class="info-content">
    <h2 class="serif" id="infoTitle" style="font-size: 2rem; margin-bottom: 15px;">Interaktion</h2>
    <p class="mono" id="infoText" style="line-height: 1.8; opacity: 0.8;"></p>
    <button class="close-btn mono" id="closeInfo">STÄNG</button>
  </div>
</div>

<script>
  // FULLSTÄNDIGT ARKIV (1-43)
  const ALL_PLATES = [
    { n: "1", a: "MISC" }, { n: "2", a: "VROOM" }, { n: "3", a: "VROOM" }, { n: "4", a: "VROOM" },
    { n: "5", a: "VROOM" }, { n: "6", a: "VROOM" }, { n: "7", a: "VROOM" }, { n: "8", a: "VROOM" },
    { n: "9", a: "VROOM" }, { n: "10", a: "VROOM" }, { n: "11", a: "VROOM" }, { n: "12", a: "VROOM" },
    { n: "14", a: "VROOM" }, { n: "15", a: "VROOM" }, { n: "16", a: "VROOM" }, { n: "17", a: "VROOM" },
    { n: "18", a: "VROOM" }, { n: "19", a: "VROOM" }, { n: "20", a: "VROOM" }, { n: "22", a: "VROOM" },
    { n: "23", a: "NATURE" }, { n: "24", a: "NATURE" }, { n: "25", a: "NATURE" }, { n: "26", a: "NATURE" },
    { n: "27", a: "VROOM" }, { n: "28", a: "VROOM" }, { n: "29", a: "VROOM" }, { n: "30", a: "VROOM" },
    { n: "31", a: "VROOM" }, { n: "32", a: "NOIR" }, { n: "33", a: "NOIR" }, { n: "34", a: "NOIR" },
    { n: "35", a: "NOIR" }, { n: "36", a: "NATURE" }, { n: "37", a: "MISC" },
    { n: "38", f: "IMG_9234.jpeg", a: "BERLIN" }, { n: "39", f: "IMG_9235.jpeg", a: "BERLIN" },
    { n: "40", f: "IMG_9236.jpeg", a: "BERLIN" }, { n: "41", f: "IMG_9237.jpeg", a: "BERLIN" },
    { n: "42", f: "IMG_9238.jpeg", a: "BERLIN" }, { n: "43", f: "IMG_9239.jpeg", a: "BERLIN" }
  ];

  // Shuffla alla bilder för "ALL"
  const DATA = ALL_PLATES.sort(() => Math.random() - 0.5);

  let lang = 'SV';
  const TEXTS = {
    SV: { guideTitle: "Interaktion", guideText: "[MUS] — Luta bilderna för perspektiv<br>[MOBIL] — Gyroskopet vinklar bilderna när du rör telefonen<br>[KLICK] — Fokusläge (större/mindre)", close: "FÖRSTÅTT", plates: "Plåtar" },
    EN: { guideTitle: "Interaction", guideText: "[MOUSE] — Tilt images for perspective<br>[MOBILE] — Gyroscope tilts images as you move phone<br>[CLICK] — Focus mode (expand/minimize)", close: "GOT IT", plates: "Plates" }
  };

  const CATS = ["BERLIN", "VROOM", "NATURE", "NOIR", "MISC", "ALL"];
  let currentFilter = "BERLIN";

  function getSrc(img) { return img.f ? `images/${img.f}` : `images/bild (${img.n}).jpg`; }

  // --- Tilt Logik ---
  function initTilt(el) {
    el.addEventListener('mousemove', (e) => {
      if(window.innerWidth < 768 || el.classList.contains('focused')) return;
      const box = el.getBoundingClientRect();
      const x = (e.clientX - box.left) / box.width - 0.5;
      const y = (e.clientY - box.top) / box.height - 0.5;
      el.querySelector('.item-img-wrap').style.transform = `rotateY(${x * 20}deg) rotateX(${y * -20}deg)`;
    });
    el.addEventListener('mouseleave', () => {
      el.querySelector('.item-img-wrap').style.transform = `rotateY(0deg) rotateX(0deg)`;
    });
  }

  // --- Mobil Gyro ---
  window.addEventListener('deviceorientation', (e) => {
    if(window.innerWidth > 768) return;
    const x = Math.min(Math.max(e.beta, -30), 30) / 1.5;
    const y = Math.min(Math.max(e.gamma, -30), 30) / 1.5;
    document.querySelectorAll('.item-img-wrap').forEach(wrap => {
      if(!wrap.closest('.focused')) wrap.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
    });
  });

  // --- Hero Flash ---
  const heroImg = document.getElementById('heroImg');
  let flashIdx = 0;
  setInterval(() => {
    flashIdx = (flashIdx + 1) % DATA.length;
    heroImg.src = getSrc(DATA[flashIdx]);
  }, 130);

  // --- Menyer ---
  document.getElementById('themeBtn').onclick = () => {
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
  };
  document.getElementById('langBtn').onclick = function() {
    lang = lang === 'SV' ? 'EN' : 'SV';
    this.textContent = lang === 'SV' ? 'EN' : 'SV';
    updateLanguage();
  };

  function updateLanguage() {
    const t = TEXTS[lang];
    document.getElementById('infoTitle').textContent = t.guideTitle;
    document.getElementById('infoText').innerHTML = t.guideText;
    document.getElementById('closeInfo').textContent = t.close;
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const filtered = currentFilter === 'ALL' ? DATA : DATA.filter(i => i.a === currentFilter);
    grid.innerHTML = '';
    document.getElementById('count').textContent = `${filtered.length} ${TEXTS[lang].plates}`;

    filtered.forEach((img, idx) => {
      const el = document.createElement('div');
      el.className = `item reveal ${idx % 7 === 0 ? 'large' : ''} ${idx % 4 === 0 ? 'tall' : ''}`;
      el.innerHTML = `
        <div class="item-img-wrap">
          <div class="item-img"><img src="${getSrc(img)}" loading="lazy"></div>
        </div>
        <div class="mono" style="margin-top:12px; color:var(--text-muted)">— PLATE ${img.n.padStart(2, '0')}</div>
      `;
      el.onclick = () => {
        el.classList.toggle('focused');
        document.body.style.overflow = el.classList.contains('focused') ? 'hidden' : 'auto';
      };
      grid.appendChild(el);
      initTilt(el);
      observer.observe(el);
    });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('is-visible'); });
  }, { threshold: 0.1 });

  const filtersEl = document.getElementById('filters');
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.className = cat === currentFilter ? 'active' : '';
    btn.onclick = () => {
      currentFilter = cat;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
      window.scrollTo({top: 0, behavior: 'smooth'});
    };
    filtersEl.appendChild(btn);
  });

  document.getElementById('infoBtn').onclick = () => document.getElementById('infoOverlay').classList.add('active');
  document.getElementById('closeInfo').onclick = () => document.getElementById('infoOverlay').classList.remove('active');

  updateLanguage();
</script>
</body>
</html>
