<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBJ</title>
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --accent: #1a1a1a;
    --ye-ease: cubic-bezier(0.9, 0, 0.1, 1);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    text-transform: uppercase; letter-spacing: -0.02em;
    overflow-x: hidden;
  }

  /* --- KANYE HEADER --- */
  header {
    padding: 100px 24px 40px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .wordmark {
    font-size: clamp(5rem, 25vw, 20rem); font-weight: 900;
    line-height: 0.75; letter-spacing: -0.05em;
    animation: ye-entrance 1.2s var(--ye-ease) forwards;
  }
  @keyframes ye-entrance {
    from { transform: translateY(100px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  nav {
    display: flex; gap: 20px; padding: 0 24px 60px;
  }
  nav button {
    background: none; border: none; color: #444; font-weight: 900;
    font-size: 0.8rem; cursor: pointer; padding: 0;
    transition: color 0.3s ease;
  }
  nav button[aria-current="true"], nav button:hover { color: #fff; }

  /* --- GRID --- */
  .grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px;
    background: var(--accent); border-top: 2px solid var(--accent);
  }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }

  .plate {
    position: relative; background: #000; overflow: hidden;
    aspect-ratio: 1/1; cursor: crosshair;
  }

  /* --- FILM GRAIN (ONLY ON IMAGES) --- */
  .frame { width: 100%; height: 100%; position: relative; overflow: hidden; }
  
  .frame img {
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.9) contrast(1.1);
    transition: transform 0.8s var(--ye-ease);
  }

  /* COD-Style Grain Overlay */
  .frame::after {
    content: ""; position: absolute; inset: -100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.12; pointer-events: none;
    animation: grain-dance 0.15s steps(2) infinite;
    mix-blend-mode: overlay;
  }

  @keyframes grain-dance {
    0% { transform: translate(0,0); }
    50% { transform: translate(-5%, -5%); }
    100% { transform: translate(5%, 5%); }
  }

  /* Hover Animations */
  .plate:hover img { transform: scale(1.1); }
  
  .plate::before { /* Shutter effect */
    content: ""; position: absolute; inset: 0; background: #fff;
    z-index: 2; opacity: 0; pointer-events: none;
  }
  .plate:active::before { animation: shutter 0.2s ease-out; }
  @keyframes shutter { 0% { opacity: 0; } 50% { opacity: 0.8; } 100% { opacity: 0; } }

  .caption {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.8); opacity: 0; transition: opacity 0.4s var(--ye-ease);
    z-index: 3;
  }
  .plate:hover .caption { opacity: 1; }
  .cap-word { font-size: 3rem; font-weight: 900; letter-spacing: -0.05em; }

  /* --- LIGHTBOX --- */
  .lightbox {
    position: fixed; inset: 0; background: #000; z-index: 9999;
    display: none; align-items: center; justify-content: center;
  }
  .lightbox.active { display: flex; animation: flick 0.1s linear; }
  @keyframes flick { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
  
  .lb-img-wrap { position: relative; max-width: 90vw; max-height: 80vh; overflow: hidden; }
  .lb-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .lb-img-wrap::after { /* Grain also in lightbox */
    content: ""; position: absolute; inset: -100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.15; animation: grain-dance 0.1s steps(2) infinite; pointer-events: none;
  }

  .lb-word { position: absolute; bottom: 30px; left: 30px; font-size: 1.5rem; font-weight: 900; }

  /* UI ELEMENTS */
  .ui-controls { position: fixed; top: 30px; right: 30px; display: flex; gap: 10px; z-index: 10000; }
  .ui-btn { 
    background: #fff; color: #000; border: none; font-weight: 900; 
    padding: 10px 20px; font-size: 0.7rem; cursor: pointer;
  }
  .ui-btn:hover { background: #ccc; }

</style>
</head>
<body>

<div class="ui-controls">
  <button class="ui-btn" id="monoToggle">B&W</button>
  <button class="ui-btn" id="themeToggle">INVERT</button>
</div>

<header>
  <div class="wordmark" id="logo">SBJ</div>
</header>

<nav id="nav"></nav>

<main>
  <div id="gallery" class="grid"></div>
</main>

<div class="lightbox" id="lightbox">
  <div class="lb-img-wrap">
    <img id="lbImg" src="">
  </div>
  <div class="lb-word" id="lbWord">WORD</div>
</div>

<script>
  const IMAGES = [
    { n: "1", w: "AMICUS", a: "MISC" },
    { n: "2", w: "EQUUS", a: "VROOM" },
    { n: "3", w: "SPIRITUS", a: "VROOM" },
    { n: "4", w: "AURUM", a: "VROOM" },
    { n: "5", w: "FERRUM", a: "VROOM" },
    { n: "6", w: "VELOX", a: "VROOM" },
    { n: "7", w: "対称", a: "VROOM" },
    { n: "8", w: "閃光", a: "VROOM" },
    { n: "9", w: "METALLUM", a: "VROOM" },
    { n: "10", w: "FORMA", a: "VROOM" },
    { n: "11", w: "LUMEN", a: "VROOM" },
    { n: "12", w: "ROTA", a: "VROOM" },
    { n: "13", w: "技術", a: "VROOM" },
    { n: "14", w: "TAURO", a: "VROOM" },
    { n: "15", w: "ALBUS", a: "VROOM" },
    { n: "16", w: "MACHINA", a: "VROOM" },
    { n: "17", w: "ITER", a: "VROOM" },
    { n: "18", w: "NOCTIS", a: "VROOM" },
    { n: "19", w: "VIA", a: "VROOM" },
    { n: "20", w: "VETUSTUS", a: "VROOM" },
    { n: "21", w: "CURVA", a: "VROOM" },
    { n: "22", w: "IGNIS", a: "VROOM" },
    { n: "23", w: "木漏れ日", a: "NATURE" },
    { n: "24", w: "SILVA", a: "NATURE" },
    { n: "25", w: "FOLIUM", a: "NATURE" },
    { n: "26", w: "VIRIDIS", a: "NATURE" },
    { n: "27", w: "VORS", a: "VROOM" },
    { n: "28", w: "CANUS", a: "VROOM" },
    { n: "29", w: "URBS", a: "VROOM" },
    { n: "30", w: "SILENT", a: "VROOM" },
    { n: "31", w: "VESPER", a: "VROOM" },
    { n: "32", w: "暗闇", a: "NOIR" },
    { n: "33", w: "UMBRA", a: "NOIR" },
    { n: "34", w: "LUX", a: "NOIR" },
    { n: "35", w: "魂", a: "NOIR" },
    { n: "36", w: "ARBOR", a: "NATURE" },
    { n: "37", w: "AETHER", a: "MISC" }
  ];

  const gallery = document.getElementById('gallery');
  const nav = document.getElementById('nav');
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbWord = document.getElementById('lbWord');

  function render(filter = 'ALL') {
    gallery.innerHTML = '';
    const filtered = filter === 'ALL' ? IMAGES : IMAGES.filter(i => i.a === filter);
    
    filtered.forEach((img, i) => {
      const plate = document.createElement('div');
      plate.className = 'plate';
      plate.innerHTML = `
        <div class="frame">
          <img src="images/bild (${img.n}).jpg" loading="lazy">
          <div class="caption"><div class="cap-word">${img.w}</div></div>
        </div>
      `;
      plate.onclick = () => {
        lbImg.src = `images/bild (${img.n}).jpg`;
        lbWord.textContent = img.w;
        lb.classList.add('active');
      };
      gallery.appendChild(plate);
    });
  }

  // Kanye-style Nav
  ['ALL', 'VROOM', 'NATURE', 'NOIR', 'MISC'].forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.onclick = () => {
      document.querySelectorAll('nav button').forEach(b => b.removeAttribute('aria-current'));
      btn.setAttribute('aria-current', 'true');
      render(cat);
    };
    if(cat === 'ALL') btn.setAttribute('aria-current', 'true');
    nav.appendChild(btn);
  });

  lb.onclick = () => lb.classList.remove('active');

  document.getElementById('monoToggle').onclick = () => {
    document.body.style.filter = document.body.style.filter === 'grayscale(1)' ? 'none' : 'grayscale(1)';
  };

  document.getElementById('themeToggle').onclick = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.body.style.background = isDark ? '#fff' : '#000';
    document.body.style.color = isDark ? '#000' : '#fff';
  };

  render();
</script>
</body>
</html>
