<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBJ — ARCHIVE</title>
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --accent: #111111;
    --ye-ease: cubic-bezier(0.8, 0, 0.1, 1);
  }

  /* Tvinga bort vanlig muspekare överallt */
  html, body, * { cursor: none !important; }

  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    text-transform: uppercase; letter-spacing: -0.03em;
    overflow-x: hidden; -webkit-font-smoothing: antialiased;
    transition: background 0.8s var(--ye-ease), color 0.8s var(--ye-ease);
  }

  /* --- CUSTOM CURSOR (SIKTE) --- */
  #cursor {
    position: fixed; top: 0; left: 0;
    width: 20px; height: 20px;
    border: 1px solid var(--text); border-radius: 50%;
    pointer-events: none; z-index: 100000;
    mix-blend-mode: difference;
    display: flex; align-items: center; justify-content: center;
    transition: width 0.3s var(--ye-ease), height 0.3s var(--ye-ease), background 0.3s;
    /* Vi använder transform i JS för rörelsen */
  }
  #cursor::after { content: ''; position: absolute; width: 2px; height: 2px; background: var(--text); border-radius: 50%; }
  body.hovering #cursor { width: 50px; height: 50px; background: rgba(255,255,255,0.1); }

  /* --- SCROLL TRACKER --- */
  #scrollLine {
    position: fixed; top: 0; left: 0; height: 2px; background: var(--text);
    width: 0%; z-index: 2000; transition: width 0.1s linear;
  }

  /* --- HEADER --- */
  header { padding: 60px 16px 10px; }
  .wordmark { font-size: clamp(4.5rem, 22vw, 14rem); font-weight: 900; line-height: 0.8; letter-spacing: -0.07em; cursor: none; }

  /* --- NAVIGATION --- */
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 16px 40px; position: sticky; top: 0; 
    background: var(--bg); z-index: 1000; transition: background 0.8s var(--ye-ease);
  }
  .nav-left { display: flex; gap: 18px; overflow-x: auto; }
  .nav-left::-webkit-scrollbar { display: none; }
  nav button { background: none; border: none; color: #444; font-weight: 900; font-size: 0.75rem; transition: color 0.3s; }
  nav button[aria-current="true"] { color: var(--text); }

  /* --- GRID --- */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--accent); }
  @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }

  .plate { position: relative; background: #000; overflow: hidden; aspect-ratio: 1/1; opacity: 0; transform: translateY(20px); transition: opacity 1s var(--ye-ease), transform 1s var(--ye-ease); }
  .plate.revealed { opacity: 1; transform: translateY(0); }

  .frame { width: 100%; height: 100%; position: relative; overflow: hidden; }
  .frame img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9) contrast(1.05); transition: transform 0.8s var(--ye-ease); }
  
  /* Svartvitt-klass för bilderna */
  body.mono-active img { filter: grayscale(1) brightness(0.9) contrast(1.1) !important; }

  .plate:hover img { transform: scale(1.05); }

  .grain { position: absolute; inset: 0; pointer-events: none; mix-blend-mode: overlay; opacity: 0.12; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

  /* --- METADATA HUD --- */
  .hud {
    position: absolute; bottom: 10px; left: 10px; font-family: monospace; font-size: 0.5rem;
    color: rgba(255,255,255,0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s;
  }
  .plate:hover .hud { opacity: 1; }

  /* --- UI CONTROLS --- */
  .ui-controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10000; }
  .ui-btn { background: #fff; color: #000; border: none; font-weight: 900; padding: 12px 24px; font-size: 0.65rem; border-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  [data-theme="light"] .ui-btn { background: #000; color: #fff; }

  /* --- LIGHTBOX --- */
  .lightbox { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; }
  .lightbox.active { display: flex; }
  .lb-img-wrap { position: relative; max-width: 95vw; max-height: 85vh; }
  .lb-img-wrap img { width: 100%; height: auto; max-height: 85vh; object-fit: contain; }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="scrollLine"></div>

<div class="ui-controls">
  <button class="ui-btn" id="monoToggle">B&W</button>
  <button class="ui-btn" id="themeToggle">INVERT</button>
</div>

<header>
  <div class="wordmark" id="logo">SBJ</div>
</header>

<nav id="stickyNav">
  <div class="nav-left" id="navLeft"></div>
  <button id="alltBtn" style="color: #444; font-weight: 900; font-size: 0.75rem; border: none; background: none; cursor:none;">ALLT</button>
</nav>

<main>
  <div id="gallery" class="grid"></div>
</main>

<div class="lightbox" id="lightbox">
  <div class="lb-img-wrap">
    <img id="lbImg" src="">
    <div class="grain"></div>
  </div>
</div>

<script>
  const IMAGES = [
    { n: "1", w: "AMICUS", a: "MISC", top: true },
    { n: "2", w: "EQUUS", a: "VROOM" },
    { n: "3", w: "SPIRITUS", a: "VROOM" },
    { n: "4", w: "AURUM", a: "VROOM" },
    { n: "5", w: "FERRUM", a: "VROOM", top: true },
    { n: "6", w: "VELOX", a: "VROOM" },
    { n: "7", w: "対称", a: "VROOM" },
    { n: "8", w: "閃光", a: "VROOM", top: true },
    { n: "9", w: "METALLUM", a: "VROOM" },
    { n: "10", w: "FORMA", a: "VROOM", top: true },
    { n: "11", w: "LUMEN", a: "VROOM" },
    { n: "12", w: "ROTA", a: "VROOM" },
    { n: "13", w: "技術", a: "VROOM", top: true },
    { n: "14", w: "TAURO", a: "VROOM", top: true },
    { n: "15", w: "ALBUS", a: "VROOM" },
    { n: "16", w: "MACHINA", a: "VROOM" },
    { n: "17", w: "ITER", a: "VROOM", top: true },
    { n: "18", w: "NOCTIS", a: "VROOM" },
    { n: "19", w: "VIA", a: "VROOM" },
    { n: "20", w: "VETUSTUS", a: "VROOM" },
    { n: "21", w: "CURVA", a: "VROOM" },
    { n: "22", w: "IGNIS", a: "VROOM", top: true },
    { n: "23", w: "木漏れ日", a: "NATURE", top: true },
    { n: "24", w: "SILVA", a: "NATURE", top: true },
    { n: "25", w: "FOLIUM", a: "NATURE" },
    { n: "26", w: "VIRIDIS", a: "NATURE" },
    { n: "27", w: "VORS", a: "VROOM" },
    { n: "28", w: "CANUS", a: "VROOM" },
    { n: "29", w: "URBS", a: "VROOM" },
    { n: "30", w: "SILENT", a: "VROOM" },
    { n: "31", w: "VESPER", a: "VROOM" },
    { n: "32", w: "暗闇", a: "NOIR", top: true },
    { n: "33", w: "UMBRA", a: "NOIR" },
    { n: "34", w: "LUX", a: "NOIR" },
    { n: "35", w: "魂", a: "NOIR", top: true },
    { n: "36", w: "ARBOR", a: "NATURE" },
    { n: "37", w: "AETHER", a: "MISC", top: true }
  ];

  const gallery = document.getElementById('gallery');
  const navLeft = document.getElementById('navLeft');
  const lb = document.getElementById('lightbox');
  const cursor = document.getElementById('cursor');
  const scrollLine = document.getElementById('scrollLine');

  // Optimerad pekare med transform
  window.addEventListener('mousemove', (e) => {
    requestAnimationFrame(() => {
        cursor.style.transform = `translate3d(${e.clientX - 10}px, ${e.clientY - 10}px, 0)`;
    });
  });

  // Scroll tracker
  window.addEventListener('scroll', () => {
    const winScroll = document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    scrollLine.style.width = scrolled + "%";
  });

  function render(filter) {
    gallery.innerHTML = '';
    let filtered = filter === 'TOP' ? IMAGES.filter(i => i.top) : (filter === 'ALLT' ? IMAGES : IMAGES.filter(i => i.a === filter));
    
    document.querySelectorAll('nav button, #alltBtn').forEach(btn => {
      btn.setAttribute('aria-current', btn.textContent === filter ? 'true' : 'false');
    });

    filtered.forEach((img, i) => {
      const plate = document.createElement('div');
      plate.className = 'plate';
      plate.onmouseenter = () => document.body.classList.add('hovering');
      plate.onmouseleave = () => document.body.classList.remove('hovering');
      
      const res = ["4000X6000", "5124X7200", "3024X4032"][Math.floor(Math.random()*3)];
      const iso = Math.floor(Math.random() * 800) + 100;
      
      plate.innerHTML = `
        <div class="frame">
          <img src="images/bild (${img.n}).jpg" loading="lazy">
          <div class="grain"></div>
          <div class="hud">IMG_${img.n} // ${res} // ISO ${iso} // ${img.w}</div>
        </div>
      `;
      plate.onclick = () => {
        document.getElementById('lbImg').src = `images/bild (${img.n}).jpg`;
        lb.classList.add('active');
        document.body.style.overflow = 'hidden';
      };
      gallery.appendChild(plate);
      setTimeout(() => plate.classList.add('revealed'), i * 60);
    });
    window.scrollTo(0,0);
  }

  ['TOP', 'VROOM', 'NATURE', 'NOIR', 'MISC'].forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.onclick = () => render(cat);
    navLeft.appendChild(btn);
  });

  document.getElementById('alltBtn').onclick = () => render('ALLT');
  document.getElementById('logo').onclick = () => render('TOP');
  lb.onclick = () => { lb.classList.remove('active'); document.body.style.overflow = 'auto'; };
  
  // FIX: Svartvitt enbart på bilder via en klass på body
  document.getElementById('monoToggle').onclick = () => {
    document.body.classList.toggle('mono-active');
  };
  
  document.getElementById('themeToggle').onclick = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    const color = isDark ? '#fff' : '#000';
    document.body.style.background = color;
    document.body.style.color = isDark ? '#000' : '#fff';
    document.getElementById('stickyNav').style.background = color;
  };

  render('TOP');
</script>
</body>
</html>
