<!DOCTYPE html>
<html lang="sv" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOT BY JULIAN — ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Archivo:wght@300;400;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4df; /* Greige bas */
    --text: #1a1a18;
    --text-muted: #878480;
    --line: rgba(0,0,0,0.08);
    --ease: cubic-bezier(0.23, 1, 0.32, 1);
  }

  [data-theme="dark"] {
    --bg: #121211;
    --text: #e8e4df;
    --text-muted: #6b6965;
    --line: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Archivo', sans-serif;
    transition: background-color 0.6s var(--ease), color 0.6s var(--ease);
    overflow-x: hidden;
  }

  button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }

  .serif { font-family: 'Fraunces', serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; }
  
  .reveal { opacity: 0; transform: translateY(30px); transition: all 1s var(--ease); }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }

  header {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    display: flex; justify-content: space-between; align-items: center;
    padding: 30px clamp(20px, 5vw, 60px);
    mix-blend-mode: difference; color: #fff;
  }
  
  .theme-toggle {
    width: 40px; height: 20px; border: 1px solid currentColor; border-radius: 20px;
    position: relative;
  }
  .theme-toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 12px; height: 12px; background: currentColor; border-radius: 50%;
    transition: transform 0.3s var(--ease);
  }
  [data-theme="dark"] .theme-toggle::after { transform: translateX(20px); }

  .hero {
    height: 100svh; width: 100%; position: relative;
    display: flex; align-items: flex-end; padding: 100px clamp(20px, 5vw, 60px);
    overflow: hidden;
  }
  .hero-bg { position: absolute; inset: 0; z-index: -1; }
  .hero-bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); }
  
  .hero-title {
    font-family: 'Fraunces', serif; font-weight: 300; font-style: italic;
    font-size: clamp(3.5rem, 12vw, 10rem); line-height: 0.85; color: #fff;
  }

  .gallery-nav {
    padding: 80px clamp(20px, 5vw, 60px) 20px;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--bg); z-index: 90;
    display: flex; justify-content: space-between; align-items: baseline;
    transition: background 0.6s var(--ease);
  }
  .filters { display: flex; gap: 25px; }
  .filters button {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--text-muted); transition: color 0.3s;
  }
  .filters button.active { color: var(--text); border-bottom: 1px solid var(--text); }

  .gallery-grid {
    padding: 60px clamp(20px, 5vw, 60px);
    display: grid; grid-template-columns: repeat(12, 1fr); gap: 80px 20px;
  }
  .item { grid-column: span 12; }
  @media (min-width: 768px) {
    .item { grid-column: span 6; }
    .item:nth-child(even) { margin-top: 100px; }
  }

  .item-img {
    width: 100%; aspect-ratio: 4/5; overflow: hidden; background: var(--line);
    margin-bottom: 15px; cursor: pointer;
  }
  .item-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s var(--ease); }
  .item:hover img { transform: scale(1.03); }

  .item-meta { display: flex; justify-content: space-between; }
  .item-name { font-family: 'Fraunces', serif; font-style: italic; font-size: 1.1rem; }

  footer {
    padding: 120px clamp(20px, 5vw, 60px) 60px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: flex-end;
  }
</style>
</head>
<body>

<header>
  <div class="serif" style="font-size: 1.2rem; font-style: italic;">SBJ</div>
  <button class="theme-toggle" id="themeBtn"></button>
</header>

<section class="hero reveal">
  <div class="hero-bg"><img id="heroImg" src="" alt=""></div>
  <h1 class="hero-title">Shot by<br>Julian</h1>
</section>

<div class="gallery-nav">
  <div class="mono" id="count">00 Images</div>
  <div class="filters" id="filters"></div>
</div>

<main class="gallery-grid" id="grid"></main>

<footer>
  <div class="serif" style="font-size: clamp(2rem, 5vw, 4rem); font-style: italic;">Julian ↗</div>
  <div class="mono" style="text-align: right;">©<span id="year"></span><br>Archive</div>
</footer>

<script>
  // TILLBAKASTÄLLDA NAMN
  const CATS = ["ALL", "VROOM", "NATURE", "NOIR", "MISC", "BERLIN"];

  const IMAGES = [
    { n: "1", w: "AMICUS", a: "MISC" }, { n: "2", w: "EQUUS", a: "VROOM" },
    { n: "5", w: "FERRUM", a: "VROOM" }, { n: "10", w: "FORMA", a: "VROOM" },
    { n: "14", w: "TAURO", a: "VROOM" }, { n: "23", w: "木漏れ日", a: "NATURE" },
    { n: "24", w: "SILVA", a: "NATURE" }, { n: "32", w: "暗闇", a: "NOIR" },
    { n: "35", w: "魂", a: "NOIR" }, { n: "38", file: "IMG_9234.jpeg", w: "BERLIN 01", a: "BERLIN" },
    { n: "43", file: "IMG_9239.jpeg", w: "BERLIN 02", a: "BERLIN" }
  ];

  let currentFilter = "ALL";

  const themeBtn = document.getElementById('themeBtn');
  themeBtn.onclick = () => {
    const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
  };

  const filtersEl = document.getElementById('filters');
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.className = cat === currentFilter ? 'active' : '';
    btn.onclick = () => {
      currentFilter = cat;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
    filtersEl.appendChild(btn);
  });

  function getSrc(img) { return img.file ? `images/${img.file}` : `images/bild (${img.n}).jpg`; }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const filtered = currentFilter === 'ALL' ? IMAGES : IMAGES.filter(i => i.a === currentFilter);
    grid.innerHTML = '';
    document.getElementById('count').textContent = `${filtered.length} Plates`;

    filtered.forEach(img => {
      const el = document.createElement('div');
      el.className = 'item reveal';
      el.innerHTML = `
        <div class="item-img"><img src="${getSrc(img)}" loading="lazy"></div>
        <div class="item-meta">
          <span class="item-name">${img.w}</span>
          <span class="mono" style="color: var(--text-muted)">${img.a}</span>
        </div>
      `;
      grid.appendChild(el);
      observer.observe(el);
    });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('is-visible'); });
  }, { threshold: 0.1 });

  document.getElementById('heroImg').src = getSrc(IMAGES[0]);
  document.getElementById('year').textContent = new Date().getFullYear();
  renderGrid();
</script>
</body>
</html>
